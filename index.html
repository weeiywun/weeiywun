<title>惟元門市 — 進貨帳務管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f4f3f0;--border:#e5e3de;--border2:#d0cec8;
  --text:#1a1917;--text2:#6b6962;--text3:#9e9b94;--accent:#1a1917;
  --green:#16a34a;--green-bg:#f0fdf4;--amber:#b45309;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;--blue:#1d4ed8;--blue-bg:#eff6ff;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-badge{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.01em;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:-2px;}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;}
.nav-tab{padding:12px 16px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem 3rem;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;box-shadow:var(--shadow);}
.card+.card{margin-top:1rem;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;box-shadow:var(--shadow);}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.metric-value{font-size:24px;font-weight:600;letter-spacing:-.02em;}
.metric-value.warn{color:var(--amber);}.metric-value.ok{color:var(--green);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);font-family:inherit;transition:all .1s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;}
.btn-primary:hover{background:#333;border-color:#333;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px;}
.btn-success{color:var(--green);border-color:#bbf7d0;background:var(--green-bg);}
.btn-success:hover{background:#dcfce7;}
.btn-danger{color:var(--red);border-color:#fecaca;background:var(--red-bg);}
.btn-danger:hover{background:#fee2e2;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface2);}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:12px;font-weight:500;color:var(--text2);}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .1s;}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,25,23,.06);}
input[readonly]{background:var(--surface2);color:var(--text2);cursor:default;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:var(--bg);}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.order-row{cursor:pointer;}
.order-row:hover td{background:#f0ede8 !important;}
.total-row td{font-weight:600;background:var(--surface2)!important;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-paid{background:var(--green-bg);color:var(--green);}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;}
.filter-row input,.filter-row select{width:auto;}
.items-header{display:grid;grid-template-columns:2.5fr 1fr 1fr 1fr 32px;gap:8px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.items-header span{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.item-row{display:grid;grid-template-columns:2.5fr 1fr 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:7px;}
.item-row input{padding:7px 9px;}
.remove-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.remove-btn:hover{background:var(--red-bg);border-color:#fecaca;color:var(--red);}
.order-footer{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;margin-top:.5rem;border-top:1px solid var(--border);}
.order-total-amount{font-size:26px;font-weight:600;letter-spacing:-.02em;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}
.sep{height:1px;background:var(--border);margin:1rem 0;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:12px;padding:1.5rem;width:340px;box-shadow:var(--shadow-md);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
.detail-modal{width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.detail-modal h3{font-size:16px;font-weight:600;}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 1.5rem;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.detail-meta-item{display:flex;flex-direction:column;gap:2px;}
.detail-meta-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.detail-meta-value{font-size:13px;font-weight:500;}
.detail-items-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;}
.detail-items-table th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg);}
.detail-items-table td{padding:9px 10px;border-bottom:1px solid var(--border);}
.detail-items-table tr:last-child td{border-bottom:none;}
.detail-total{display:flex;justify-content:flex-end;align-items:baseline;gap:8px;padding-top:.75rem;border-top:1px solid var(--border);}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;}
.kebab-wrap{position:relative;}
.kebab-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .1s;letter-spacing:1px;}
.kebab-btn:hover{background:var(--surface2);}
.kebab-menu{position:absolute;right:0;top:36px;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-md);min-width:150px;z-index:300;overflow:hidden;display:none;}
.kebab-menu.open{display:block;}
.kebab-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit;color:var(--text);}
.kebab-item:hover{background:var(--surface2);}
.kebab-item.danger{color:var(--red);}
.kebab-sep{height:1px;background:var(--border);margin:4px 0;}
.refund-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8;}
.edit-item-row{display:grid;grid-template-columns:2fr 1fr 0.8fr 0.7fr 1fr 28px;gap:6px;align-items:center;margin-bottom:7px;}
.edit-item-row input,.edit-item-row select{padding:6px 8px;font-size:13px;}
.item-row{display:grid;grid-template-columns:2.2fr 1fr 0.8fr 0.7fr 1fr 32px;gap:7px;align-items:start;margin-bottom:10px;}
.item-row input,.item-row select{padding:7px 9px;}
.price-hint{font-size:11px;color:var(--text3);margin-top:3px;min-height:15px;line-height:1.3;}
.price-hint.up{color:var(--red);}
.price-hint.down{color:var(--green);}
.price-hint.same{color:var(--amber);}
.vendor-tab{padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap;}
.vendor-tab:hover{color:var(--text);}
.vendor-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500;}
.vendor-tab .unpaid-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:5px;vertical-align:middle;}
.vendor-cat-tab{padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-bottom:none;background:var(--surface2);color:var(--text2);font-family:inherit;border-radius:7px 7px 0 0;transition:all .15s;}
.vendor-cat-tab:hover{background:var(--surface);color:var(--text);}
.vendor-cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.pay-chip{display:inline-flex;align-items:center;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--border2);cursor:pointer;transition:all .12s;color:var(--text2);background:var(--surface);}
.pay-chip:hover{border-color:var(--border2);background:var(--surface2);}
.pay-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
.price-result{background:var(--surface2);border-radius:8px;padding:1rem;margin-top:1rem;}
.price-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.price-row:last-child{border-bottom:none;}
.price-item{font-weight:500;}
.price-meta{color:var(--text3);font-size:12px;}
.vendor-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:1rem;}
.vendor-header{padding:1.25rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);}
.vendor-name{font-size:16px;font-weight:600;}
.vendor-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.vendor-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.vendor-stat{background:var(--surface);padding:12px 1.25rem;}
.vendor-stat-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.vendor-stat-value{font-size:16px;font-weight:600;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;}
.sync-dot.synced{background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.print-title{display:none;}
@media print{
  .header,.nav,.filter-row,.btn,.no-print{display:none!important;}
  .section{display:block!important;}
  #sec-orders,#sec-add,#sec-vendors,#sec-price,#sec-cod{display:none!important;}
  #sec-monthly{display:block!important;}
  body{background:#fff;margin:0;}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:.5rem;}
  .main{padding:0 1rem;}
  .print-title{display:block!important;font-size:18px;font-weight:600;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid #000;}
  #monthly-summary{margin-bottom:.5rem;}
  #print-summary-page{display:block!important;}
  #print-summary-page + *{page-break-before:always;}
}
</style>
</head>
<body>
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:2.5rem 2rem;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;">
    <div style="font-size:28px;font-weight:700;margin-bottom:.25rem;">惟</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:.25rem;">惟元門市 進貨管理</div>
    <div style="font-size:12px;color:#888;margin-bottom:1.75rem;">請輸入密碼以繼續</div>
    <input type="password" id="auth-input" placeholder="請輸入密碼"
      style="width:100%;padding:.75rem 1rem;border:1.5px solid #ddd;border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;text-align:center;letter-spacing:.2em;"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="color:#e53e3e;font-size:12px;margin-top:.5rem;min-height:18px;"></div>
    <button onclick="checkAuth()"
      style="width:100%;margin-top:.75rem;padding:.75rem;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.05em;">
      進入系統
    </button>
  </div>
</div>

<script>
(function() {
  const PWD = '53251954';
  const KEY = 'ww_auth';
  const DAYS = 1;
  function isAuthed() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      return d && d.exp > Date.now();
    } catch { return false; }
  }
  function checkAuth() {
    const val = document.getElementById('auth-input').value;
    if (val === PWD) {
      localStorage.setItem(KEY, JSON.stringify({ exp: Date.now() + DAYS * 86400000 }));
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('auth-input').value = '';
    } else {
      const err = document.getElementById('auth-error');
      err.textContent = '密碼錯誤，請再試一次';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
      setTimeout(() => err.textContent = '', 3000);
    }
  }
  window.checkAuth = checkAuth;
  if (!isAuthed()) {
    document.getElementById('auth-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('auth-input').focus(), 100);
  } else {
    document.getElementById('auth-overlay').style.display = 'none';
  }
})();
</script>

<div class="main">

    <div class="print-title" id="print-title"></div>

function today() { return new Date().toISOString().slice(0, 10); }
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);

async function sbFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || 'return=representation',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadOrders() {
  setSyncStatus('syncing', '載入中…');
  try {
    const ordersData = await sbFetch('orders?select=*&order=date.asc&limit=10000');
    let itemsData = [];
    let offset = 0;
    const batchSize = 1000;
    while (true) {
      const batch = await sbFetch(`order_items?select=*&order=sort_order.asc&limit=${batchSize}&offset=${offset}`, {
        headers: { 'Range-Unit': 'items', 'Range': `${offset}-${offset + batchSize - 1}` }
      });
      if (!batch || batch.length === 0) break;
      itemsData = itemsData.concat(batch);
      if (batch.length < batchSize) break;
      offset += batchSize;
    }
    const itemMap = {};
    itemsData.forEach(i => {
      if (!itemMap[i.order_id]) itemMap[i.order_id] = [];
      itemMap[i.order_id].push({ name: i.name, qty: i.qty, price: i.price, unit: i.unit || '斤' });
    });
    orders = ordersData.map(o => ({
      id: o.id, date: o.date, orderId: o.order_id, vendor: o.vendor, items: itemMap[o.id] || [],
      total: Number(o.total), status: o.status, paidDate: o.paid_date || '',
      payMethod: o.pay_method || '', payNote: o.pay_note || '', note: o.note || '', type: o.type || '', refundOf: o.refund_of || ''
    }));
    setSyncStatus('synced', `已同步 ${orders.length} 筆`);
    supabaseReady = true;
  } catch (e) {
    setSyncStatus('error', '離線模式');
    supabaseReady = false;
  }
  renderOrders();
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-text');
  if (dot) dot.className = 'sync-dot ' + state;
  if (label) label.textContent = text;
}

// ── 月底結算標記付款 (修復版：確保 UI 與數據同步) ──────────────────────────────
async function batchMarkPaid() {
  const ym = document.getElementById('monthly-month').value;
  if (!ym) { alert('請先選擇月份並查詢'); return; }
  if (!supabaseReady) { alert('目前為離線模式，無法批次更新'); return; }

  const unpaidList = orders.filter(o => o.date.startsWith(ym) && o.status === 'pending');
  if (!unpaidList.length) { alert('本月已無未付款訂單'); return; }

  const total = unpaidList.reduce((s, o) => s + o.total, 0);
  const confirmed = confirm(`【本月全數標記付款】\n月份：${ym}\n未付款：${unpaidList.length} 筆\n總額：$${total.toLocaleString()}\n確定要標記嗎？`);
  if (!confirmed) return;

  const paidDate = prompt('請輸入付款日期：', today());
  if (!paidDate || !paidDate.trim()) return;

  const btn = document.querySelector('.btn-success.no-print');
  if (btn) { btn.disabled = true; btn.textContent = '處理中…'; }

  let done = 0, failed = 0;
  for (const o of unpaidList) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${o.id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ status: 'paid', paid_date: paidDate.trim() })
      });
      if (res.ok) {
        // 重要：同步更新本地 orders 陣列
        o.status = 'paid';
        o.paidDate = paidDate.trim();
        done++;
      } else { failed++; }
    } catch (e) { failed++; }
  }

  if (btn) { btn.disabled = false; btn.textContent = '✓ 本月全數標記付款'; }
  
  // 重新渲染畫面
  renderOrders();
  renderMonthly();
  
  if (failed > 0) alert(`完成！成功：${done} 筆，失敗：${failed} 筆`);
  else toast(`✓ 已將 ${done} 筆訂單標記為已付款`);
}

// ── 貨到付款功能 (修復版：加入錯誤捕捉與載入檢查) ──────────────────────────────
async function _codFetch(path, options) {
  const base = SUPABASE_URL + '/rest/v1/';
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': (options && options.prefer) || 'return=representation'
  };
  const res = await fetch(base + path, { ...options, headers });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function renderCodList() {
  const container = document.getElementById('cod-list');
  if (!container) return;
  container.innerHTML = '<div style="padding:1rem;color:var(--text3);font-size:13px;">載入中…</div>';
  
  try {
    // 試圖抓取 cod_records (或 cod_record)
    const data = await _codFetch('cod_records?select=*&order=send_date.desc');
    
    if (!data || !Array.isArray(data)) {
        throw new Error("回傳資料格式錯誤或表格不存在");
    }

    const all = data.map(r => ({
        id: r.id, 
        sendDate: r.send_date || '-', 
        recipient: r.recipient || '未知', 
        tracking: r.tracking || '-', 
        amount: Number(r.amount) || 0, 
        note: r.note || '', 
        expectedDate: r.expected_date || '', 
        collected: !!r.collected, 
        collectedDate: r.collected_date || '', 
        actualAmount: r.actual_amount != null ? Number(r.actual_amount) : null 
    }));

    if (all.length === 0) { 
        container.innerHTML = '<div class="empty">尚無代收款記錄</div>'; 
        return; 
    }

    const showUncollected = document.getElementById('cod-show-uncollected')?.checked;
    const records = showUncollected ? all.filter(r => !r.collected) : all;
    const todayStr = today();
    const totalUncollected = all.filter(r => !r.collected).reduce((s, r) => s + r.amount, 0);
    
    let statsHTML = `<div style="display:flex;gap:1.5rem;padding:.75rem 1rem;background:var(--surface2);border-radius:8px;margin-bottom:1rem;font-size:13px;">
      <div><span style="color:var(--text3);">待到帳筆數 </span><span style="font-weight:600;color:var(--amber);">${all.filter(r=>!r.collected).length} 筆</span></div>
      <div><span style="color:var(--text3);">待到帳總額 </span><span style="font-weight:600;color:var(--amber);">$${totalUncollected.toLocaleString()}</span></div>
    </div>`;

    const rows = records.map(r => {
      const isOverdue = !r.collected && r.expectedDate && r.expectedDate <= todayStr;
      return `<div style="display:grid;grid-template-columns:1fr 1fr 1.2fr 1fr auto;gap:10px;align-items:center;padding:.85rem 1rem;border-bottom:1px solid var(--border);${r.collected?'opacity:.5;':''}${isOverdue?'background:rgba(255,193,7,.06);':''}">
        <div><div style="font-size:12px;color:var(--text3);">寄件日</div><div>${r.sendDate}</div></div>
        <div><div style="font-size:12px;color:var(--text3);">收件人</div><div>${r.recipient}</div></div>
        <div><div style="font-size:12px;color:var(--text3);">物流編號</div><div class="mono">${r.tracking}</div></div>
        <div><div style="font-size:12px;color:var(--text3);">金額</div><div style="font-weight:600;">$${r.amount.toLocaleString()}</div></div>
        <div style="display:flex;gap:5px;">
          ${!r.collected ? `<button class="btn btn-sm btn-success" onclick="confirmCodCollected('${r.id}')">確認</button>` : '<span style="color:var(--green);font-weight:600;padding:0 8px;">✓ 已收</span>'}
          <button class="btn btn-sm" onclick="deleteCodRecord('${r.id}')">刪</button>
        </div>
      </div>`;
    }).join('');
    container.innerHTML = statsHTML + `<div style="border:1px solid var(--border);border-radius:10px;">${rows}</div>`;
  } catch (e) { 
    console.error(e);
    container.innerHTML = `<div style="color:red;padding:1rem;">載入失敗：請確認 Supabase Table 名稱是否為 cod_records</div>`; 
  }
}

async function addCodRecord() {
  const sendDate = document.getElementById('cod-send-date').value;
  const recipient = document.getElementById('cod-recipient').value.trim();
  const tracking = document.getElementById('cod-tracking').value.trim();
  const amount = parseFloat(document.getElementById('cod-amount').value) || 0;
  const note = document.getElementById('cod-note').value.trim();
  if (!sendDate || !recipient || !tracking || !amount) { alert('請填寫完整資訊'); return; }
  const rec = { id: Date.now().toString(), send_date: sendDate, recipient, tracking, amount, collected: false, expected_date: calcExpectedDate(sendDate), note };
  try {
    await _codFetch('cod_records', { method: 'POST', body: JSON.stringify(rec) });
    renderCodList(); toast('✓ 已新增紀錄');
    document.getElementById('cod-recipient').value='';
    document.getElementById('cod-tracking').value='';
    document.getElementById('cod-amount').value='';
    document.getElementById('cod-note').value='';
  } catch(e) { alert(e.message); }
}

function calcExpectedDate(sendDate) {
  const d = new Date(sendDate); d.setDate(d.getDate() + 2);
  return d.toISOString().slice(0, 10);
}

async function confirmCodCollected(id) {
  const date = prompt('入帳日期：', today());
  if (!date) return;
  try {
    await _codFetch('cod_records?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ collected: true, collected_date: date.trim() }) });
    renderCodList(); toast('✓ 已確認');
  } catch(e) { alert(e.message); }
}

async function deleteCodRecord(id) {
  if (!confirm('刪除？')) return;
  try {
    await _codFetch('cod_records?id=eq.' + id, { method: 'DELETE' });
    renderCodList();
  } catch(e) { alert(e.message); }
}

function renderOrders() {
  const fm = document.getElementById('filter-month').value;
  const fv = document.getElementById('filter-vendor').value.toLowerCase();
  const fid = document.getElementById('filter-orderid').value.toLowerCase();
  const fi = document.getElementById('filter-item').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  let list = orders.filter(o => {
    if (fm && !o.date.startsWith(fm)) return false;
    if (fv && !o.vendor.toLowerCase().includes(fv)) return false;
    if (fid && !o.orderId.toLowerCase().includes(fid)) return false;
    if (fs && o.status !== fs) return false;
    if (fi) {
      return o.items.some(it => it.name.toLowerCase().includes(fi));
    }
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date));
  const tb = document.getElementById('orders-tbody');
  tb.innerHTML = list.map(o => `
    <tr class="order-row" onclick="showDetail('${o.id}')">
      <td>${o.date}</td><td class="mono">${o.orderId||'—'}</td><td style="font-weight:500;">${o.vendor}</td>
      <td>${o.items[0]?.name} 等 ${o.items.length} 項</td><td style="font-weight:600;">$${o.total.toLocaleString()}</td>
      <td><span class="badge ${o.status==='paid'?'badge-paid':'badge-pending'}">${o.status==='paid'?'已付':'未付'}</span> ${o.type==='refund'?'<span class="refund-badge">退貨</span>':''}</td>
      <td>${o.paidDate||'—'}</td>
    </tr>`).join('');
  renderSummary();
}

    <div class="metric"><div class="metric-label">總金額</div><div class="metric-value">$${total.toLocaleString()}</div></div>

    </div>
    <table class="detail-items-table">
      <thead><tr><th>品名</th><th>數量</th><th>單價</th><th>小計</th></tr></thead>
      <tbody>${o.items.map(i=>`<tr><td>${i.name}</td><td>${i.qty} ${i.unit}</td><td>$${i.price}</td><td>$${(i.qty*i.price).toLocaleString()}</td></tr>`).join('')}</tbody>
    </table>
    <div class="detail-total"><span style="font-size:12px;color:var(--text3);">應付金額</span><span style="font-size:20px;font-weight:600;">$${o.total.toLocaleString()}</span></div>
  `;
  document.getElementById('detail-actions').innerHTML = `
    <div class="kebab-wrap no-print">
      <button class="kebab-btn" onclick="toggleKebab(event)">⋮</button>
      <div class="kebab-menu" id="kebab-menu">
        <button class="kebab-item" onclick="printDetail()">⎙ 列印出貨單</button>
        <button class="kebab-item" onclick="editOrder('${o.id}')">✎ 編輯訂單</button>
        <div class="kebab-sep"></div>
        <button class="kebab-item danger" onclick="deleteOrder('${o.id}')">✕ 刪除訂單</button>
      </div>
    </div>
    <div style="flex:1"></div>
    <button class="btn" onclick="closeDetail()">關閉</button>
    ${o.status==='pending'?`<button class="btn btn-primary" onclick="openModal('${o.id}');closeDetail()">標記已付款</button>`:''}
  `;
  document.getElementById('detail-modal-bg').style.display = 'flex';
}

function closeDetail() { document.getElementById('detail-modal-bg').style.display = 'none'; }
function openModal(id) { pendingPaidId = id; document.getElementById('modal-date').value = today(); document.getElementById('modal-bg').style.display = 'flex'; }
function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }
async function confirmPaid() {
  const d = document.getElementById('modal-date').value;
  const o = orders.find(x => x.id === pendingPaidId);
  if (o) {
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${o.id}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'paid', paid_date: d })
      });
      o.status = 'paid'; o.paidDate = d; renderOrders(); toast('✓ 已完成付款標記');
    } catch(e) { alert(e.message); }
  }
  closeModal();
}

function renderMonthly() {
  const ym = document.getElementById('monthly-month').value;
  if (!ym) return;
  const list = orders.filter(o => o.date.startsWith(ym));
  const printTitle = document.getElementById('print-title');
  if(printTitle) printTitle.textContent = ym + ' 採購帳務報表';

  if (list.length === 0) {
    document.getElementById('monthly-summary').innerHTML = '';
    document.getElementById('monthly-table').innerHTML = '<div class="empty">該月份無採購記錄</div>';
    return;
  }

  const vMap = {};
  list.forEach(o => {
    if (!vMap[o.vendor]) vMap[o.vendor] = { total: 0, pending: 0, count: 0 };
    vMap[o.vendor].total += o.total;
    vMap[o.vendor].count += 1;
    if (o.status === 'pending') vMap[o.vendor].pending += o.total;
  });

  const total = list.reduce((s, o) => s + o.total, 0);
  const unpaid = list.filter(o => o.status === 'pending').reduce((s, o) => s + o.total, 0);

  document.getElementById('monthly-summary').innerHTML = `
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem;">
      <div class="metric"><div class="metric-label">總訂單</div><div class="metric-value">${list.length}</div></div>
      <div class="metric"><div class="metric-label">本月採購額</div><div class="metric-value">$${total.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">待付款</div><div class="metric-value warn">$${unpaid.toLocaleString()}</div></div>
    </div>
  `;

  let html = `<table><thead><tr><th>廠商</th><th>訂單筆數</th><th>本月金額</th><th>未付金額</th><th>狀態</th></tr></thead><tbody>`;
  Object.keys(vMap).sort((a,b) => vMap[b].total - vMap[a].total).forEach(v => {
    html += `<tr><td>${v}</td><td>${vMap[v].count}</td><td>$${vMap[v].total.toLocaleString()}</td><td style="color:var(--amber);">$${vMap[v].pending.toLocaleString()}</td><td><span class="badge ${vMap[v].pending===0?'badge-paid':'badge-pending'}">${vMap[v].pending===0?'已付清':'有欠款'}</span></td></tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('monthly-table').innerHTML = html;
}

function renderVendors() {
  const cat = document.querySelector('.vendor-cat-tab.active').dataset.cat;
  const list = VENDOR_CATEGORIES[cat] || [];
  const tabContainer = document.getElementById('vendor-tabs');
  tabContainer.innerHTML = list.map(v => {
    const hasUnpaid = orders.some(o => o.vendor === v && o.status === 'pending');
    return `<button class="vendor-tab" data-vendor="${v}" onclick="selectVendor('${v}')">${v}${hasUnpaid?'<span class="unpaid-dot"></span>':''}</button>`;
  }).join('');
  if (list.length > 0) selectVendor(list[0]);
}

function selectVendorCategory(cat) {
  document.querySelectorAll('.vendor-cat-tab').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
  renderVendors();
}

function selectVendor(v) {
  document.querySelectorAll('.vendor-tab').forEach(el => el.classList.toggle('active', el.dataset.vendor === v));
  const list = orders.filter(o => o.vendor === v).sort((a,b) => b.date.localeCompare(a.date));
  const unpaid = list.filter(o => o.status === 'pending').reduce((s,o) => s + o.total, 0);
  const total = list.reduce((s,o) => s + o.total, 0);
  
  document.getElementById('vendor-content').innerHTML = `
    <div class="vendor-card">
      <div class="vendor-header"><div class="vendor-name">${v}</div><div class="vendor-meta">累計採購 ${list.length} 筆</div></div>
      <div class="vendor-stats">
        <div class="vendor-stat"><div class="vendor-stat-label">累計總額</div><div class="vendor-stat-value">$${total.toLocaleString()}</div></div>
        <div class="vendor-stat"><div class="vendor-stat-label">未付餘額</div><div class="vendor-stat-value warn">$${unpaid.toLocaleString()}</div></div>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>日期</th><th>金額</th><th>狀態</th></tr></thead>
        <tbody>${list.slice(0,10).map(o => `<tr><td>${o.date}</td><td>$${o.total.toLocaleString()}</td><td><span class="badge ${o.status==='paid'?'badge-paid':'badge-pending'}">${o.status==='paid'?'已付':'未付'}</span></td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
  `;
}

function initPriceSearch() {
  const vendors = [...new Set(orders.map(o => o.vendor))];
  document.getElementById('price-vendor').innerHTML = '<option value="">所有廠商</option>' + vendors.map(v => `<option value="${v}">${v}</option>`).join('');
}

function renderPriceSearch() {
  const q = document.getElementById('price-search').value.toLowerCase();
  const v = document.getElementById('price-vendor').value;
  if (!q) { document.getElementById('price-results').innerHTML = ''; return; }
  
  const results = [];
  orders.forEach(o => {
    if (v && o.vendor !== v) return;
    o.items.forEach(it => {
      if (it.name.toLowerCase().includes(q)) {
        results.push({ date: o.date, vendor: o.vendor, name: it.name, price: it.price, unit: it.unit });
      }
    });
  });
  
  results.sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('price-results').innerHTML = results.length === 0 ? '<div class="empty">查無採購紀錄</div>' : `
    <div class="table-wrap">
      <table><thead><tr><th>日期</th><th>廠商</th><th>品項</th><th>價格</th></tr></thead>
      <tbody>${results.map(r => `<tr><td>${r.date}</td><td>${r.vendor}</td><td>${r.name}</td><td style="font-weight:600;">$${r.price} / ${r.unit}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
}

let formCounter = 0;
function addOrderForm() {
  formCounter++;
  const fid = formCounter;
  const html = `
    <div class="card order-form-card" id="oform-${fid}">
      <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
        <span style="font-weight:600;color:var(--text3);">#${fid} 採購訂單</span>
        <button class="btn btn-sm btn-ghost" onclick="removeOrderForm(${fid})">✕ 移除</button>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>日期 *</label><input type="date" id="f-date-${fid}" value="${today()}"></div>
        <div class="form-group"><label>廠商 *</label><input type="text" id="f-vendor-${fid}" list="vendor-list" placeholder="輸入廠商名稱"></div>
        <div class="form-group"><label>類別</label><select id="f-type-${fid}"><option value="buy">一般進貨</option><option value="refund">退貨</option></select></div>
      </div>
      <div class="sep"></div>
      <div class="items-header"><span>品名</span><span>數量</span><span>單位</span><span>單價</span><span></span></div>
      <div id="items-container-${fid}"></div>
      <button class="btn btn-sm btn-ghost" onclick="addItemRow(${fid})" style="margin-top:5px;">+ 新增品項</button>
      <div class="order-footer">
        <div class="order-total-label">總計金額</div>
        <div class="order-total-amount" id="f-total-${fid}">$0</div>
      </div>
    </div>
  `;
  document.getElementById('order-forms-container').insertAdjacentHTML('beforeend', html);
  addItemRow(fid);
}

function addItemRow(fid) {
  const iid = Date.now() + Math.random();
  const html = `
    <div class="item-row" id="row-${iid}">
      <input type="text" placeholder="商品名稱" class="iname" oninput="updateRowTotal(${fid})">
      <input type="number" value="1" min="0" class="iqty" oninput="updateRowTotal(${fid})">
      <input type="text" value="斤" class="iunit" style="width:60px;">
      <input type="number" placeholder="單價" class="iprice" oninput="updateRowTotal(${fid})">
      <button class="remove-btn" onclick="this.parentElement.remove();updateRowTotal(${fid})">✕</button>
    </div>
  `;
  document.getElementById(`items-container-${fid}`).insertAdjacentHTML('beforeend', html);
}

function updateRowTotal(fid) {
  let total = 0;
  const container = document.getElementById(`items-container-${fid}`);
  container.querySelectorAll('.item-row').forEach(row => {
    const q = parseFloat(row.querySelector('.iqty').value) || 0;
    const p = parseFloat(row.querySelector('.iprice').value) || 0;
    total += q * p;
  });
  document.getElementById(`f-total-${fid}`).textContent = '$' + Math.round(total).toLocaleString();
}

function removeOrderForm(fid) {
  const el = document.getElementById(`oform-${fid}`);
  if (el) el.remove();
}

async function saveAllOrders() {
  const cards = document.querySelectorAll('.order-form-card');
  if (cards.length === 0) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';
  
  try {
    for (const card of cards) {
      const fid = card.id.split('-')[1];
      const date = document.getElementById(`f-date-${fid}`).value;
      const vendor = document.getElementById(`f-vendor-${fid}`).value.trim();
      const type = document.getElementById(`f-type-${fid}`).value;
      if (!date || !vendor) continue;
      
      const items = [];
      card.querySelectorAll('.item-row').forEach(row => {
        const name = row.querySelector('.iname').value.trim();
        const qty = parseFloat(row.querySelector('.iqty').value) || 0;
        const price = parseFloat(row.querySelector('.iprice').value) || 0;
        const unit = row.querySelector('.iunit').value.trim();
        if (name) items.push({ name, qty, price, unit });
      });
      
      if (items.length === 0) continue;
      const total = items.reduce((s, i) => s + i.qty * i.price, 0);
      const orderData = { id: Date.now().toString() + Math.random(), date, vendor, total, status: 'pending', type };
      
      await sbFetch('orders', { method: 'POST', body: JSON.stringify(orderData) });
      for (const it of items) {
        await sbFetch('order_items', { method: 'POST', body: JSON.stringify({ order_id: orderData.id, ...it }) });
      }
    }
    toast('✓ 訂單已全數儲存');
    setTimeout(() => location.reload(), 1500);
  } catch(e) { alert(e.message); btn.disabled = false; btn.textContent = '儲存全部訂單'; }
}

(async () => {
  await loadOrders();
  if (orders.length === 0) addOrderForm();
})();
</script>
