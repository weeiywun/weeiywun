<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iI0U4NzUxQSIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9InNlcmlmIiBmb250LXNpemU9IjE4IiBmb250LXdlaWdodD0iYm9sZCIgCiAgICAgICAgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuW4szwvdGV4dD4KPC9zdmc+">
<title>惟元門市 — 進貨帳務管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  corePlugins: { preflight: false },
  important: false,
  theme: {
    extend: {
      colors: {
        bg: 'var(--bg)',
        surface: { DEFAULT: 'var(--surface)', '2': 'var(--surface2)' },
        border: { DEFAULT: 'var(--border)', '2': 'var(--border2)' },
        txt: { DEFAULT: 'var(--text)', '2': 'var(--text2)', '3': 'var(--text3)' },
        accent: 'var(--accent)',
        brand: { DEFAULT: 'var(--brand)', light: 'var(--brand-light)' },
        ok: { DEFAULT: 'var(--green)', bg: 'var(--green-bg)' },
        warn: { DEFAULT: 'var(--amber)', bg: 'var(--amber-bg)' },
        err: { DEFAULT: 'var(--red)', bg: 'var(--red-bg)' },
        info: { DEFAULT: 'var(--blue)', bg: 'var(--blue-bg)' },
      },
      boxShadow: {
        card: 'var(--shadow)',
        md: 'var(--shadow-md)',
        lg: 'var(--shadow-lg)',
      },
      borderRadius: {
        card: '14px',
      },
      fontFamily: {
        sans: ["'Noto Sans TC'", 'sans-serif'],
        mono: ["'JetBrains Mono'", 'monospace'],
      },
    },
  },
}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 密碼保護 -->
<div id="auth-overlay" class="hidden fixed inset-0 bg-bg z-[9999] flex items-center justify-center p-4">
  <div class="bg-surface rounded-card p-10 px-8 w-80 max-w-full shadow-lg text-center border border-border">
    <div class="w-10 h-10 bg-brand rounded-lg flex items-center justify-center text-white text-base font-bold font-serif mx-auto mb-3">帳</div>
    <div class="text-[15px] font-semibold mb-0.5 text-txt">惟元門市</div>
    <div class="text-xs text-txt-3 mb-6">進貨帳務管理系統</div>
    <input type="password" id="auth-input" placeholder="密碼"
      class="auth-input w-full py-3 px-4 border border-border-2 rounded-md text-sm text-center tracking-[.15em] font-sans transition-colors focus:border-brand focus:ring-2 focus:ring-brand/10 outline-none"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" class="text-err text-xs mt-2 min-h-[18px]"></div>
    <button onclick="checkAuth()"
      class="w-full mt-3 py-3 bg-brand text-white border-none rounded-md text-sm font-medium cursor-pointer tracking-wide font-sans transition-colors hover:bg-[#c25e16]">
      進入系統
    </button>
  </div>
</div>

<script src="js/auth.js"></script>

<div class="header">
  <div class="header-inner">
    <a class="logo logo-link" onclick="switchTab('add')" href="javascript:void(0)">
      <div class="logo-badge">帳</div>
      <div>
        <div class="logo-text">惟元門市 進貨管理</div>
        <div class="logo-sub">採購帳務系統 v4.7</div>
      </div>
    </a>
    <button id="admin-logout-btn" class="btn btn-sm btn-ghost text-xs text-txt-3 ml-1" onclick="localStorage.removeItem('ww_auth');localStorage.removeItem('ww_employee_auth');location.reload();">登出</button>
    <div class="flex gap-2 items-center no-print">
      <div class="flex items-center gap-1.5 text-xs text-txt-3">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">連線中…</span>
      </div>
      <button class="btn btn-sm" onclick="forceResync()" title="重新同步資料庫">↺ 同步</button>
      <button class="btn btn-sm" onclick="exportCSV()">↓ 匯出 CSV</button>
      <button class="btn btn-sm" onclick="backupData()">↓ 備份資料</button>
      <button class="btn btn-sm btn-primary" onclick="switchTab('add')">+ 新增訂單</button>
    </div>
  </div>
</div>

<div class="nav no-print">
  <div class="nav-inner">
    <button class="nav-tab active" data-tab="add" onclick="switchTab('add')">新增訂單</button>
    <button class="nav-tab" data-tab="orders" onclick="switchTab('orders')">訂單管理</button>
    <button class="nav-tab" data-tab="monthly" onclick="switchTab('monthly')">月底結算</button>
    <button class="nav-tab" data-tab="vendors" onclick="switchTab('vendors')">廠商彙總</button>
    <button class="nav-tab" data-tab="price" onclick="switchTab('price')">歷史價格查詢</button>
    <button class="nav-tab" data-tab="cod" onclick="switchTab('cod')">貨到付款查帳</button>
  </div>
</div>

<div class="main">

  <!-- 訂單管理 -->
  <div id="sec-orders" class="section">
    <div class="metrics grid-cols-3" id="summary-cards"></div>
    <div class="card">
      <div class="filter-row">
        <input type="month" id="filter-month" onchange="renderOrders()" class="w-[150px]">
        <input type="text" id="filter-vendor" placeholder="搜尋廠商…" oninput="renderOrders()" class="w-[130px]">
        <input type="text" id="filter-orderid" placeholder="訂單編號…" oninput="renderOrders()" class="w-[130px]">
        <input type="text" id="filter-item" placeholder="搜尋商品…" oninput="renderOrders()" class="w-[130px]">
        <select id="filter-status" onchange="renderOrders()" class="w-[120px]">
          <option value="">全部狀態</option>
          <option value="pending">未付款</option>
          <option value="paid">已付款</option>
        </select>
        <button class="btn btn-sm btn-ghost" onclick="clearFilters()">✕ 清除</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>訂單編號</th><th>廠商</th><th>品項（點擊展開）</th><th>訂單金額</th><th>狀態</th><th>付款日期</th>
          </tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 新增訂單 -->
  <div id="sec-add" class="section active">
    <div class="metrics grid-cols-3 mb-5" id="add-summary-cards"></div>
    <div id="order-forms-container"></div>
    <button class="btn btn-sm mb-4" onclick="addOrderForm()">
      + 新增一張訂單
    </button>
    <div class="flex gap-2 justify-end mt-2">
      <button class="btn" onclick="resetAllForms()">清除全部</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveAllOrders()">儲存全部訂單</button>
    </div>
    <div id="save-msg" class="text-right mt-2 text-[13px] text-ok min-h-[18px]"></div>
  </div>

  <!-- 月底結算 -->
  <div id="sec-monthly" class="section">
    <div class="print-title" id="print-title"></div>
    <div id="print-summary-page" class="hidden"></div>
    <div class="card">
      <div class="filter-row no-print mb-5">
        <div class="form-group flex-none"><label class="text-xs font-medium text-txt-2">選擇月份</label><input type="month" id="monthly-month" class="w-[170px]"></div>
        <button class="btn btn-primary mt-4" onclick="renderMonthly()">查詢</button>
        <div class="flex gap-2 mt-4 ml-auto">
          <button class="btn btn-success no-print" onclick="batchMarkPaid()">✓ 本月全數標記付款</button>
          <button class="btn btn-sm no-print" onclick="printMonthly()">⎙ 列印本月報表</button>
        </div>
      </div>
      <div id="monthly-summary"></div>
      <div id="monthly-table" class="overflow-x-auto mt-4"></div>
    </div>
  </div>

  <!-- 廠商彙總 -->
  <div id="sec-vendors" class="section">
    <div class="flex gap-1 mb-0" id="vendor-category-tabs">
      <button class="vendor-cat-tab active" data-cat="中藥材" onclick="selectVendorCategory('中藥材')">中藥材</button>
      <button class="vendor-cat-tab" data-cat="包裝材" onclick="selectVendorCategory('包裝材')">包裝材</button>
      <button class="vendor-cat-tab" data-cat="其他" onclick="selectVendorCategory('其他')">其他</button>
      <button class="vendor-cat-tab" data-cat="物流" onclick="selectVendorCategory('物流')">物流</button>
      <button class="vendor-cat-tab" data-cat="大樓修繕" onclick="selectVendorCategory('大樓修繕')">大樓修繕</button>
    </div>
    <div class="flex gap-2 items-center mt-3 mb-4 flex-wrap">
      <input type="text" id="vendor-search" placeholder="搜尋廠商…" oninput="renderVendorTabs()" class="w-[150px]">
      <div class="w-px h-5 bg-border mx-0.5"></div>
      <span class="text-xs text-txt-3 whitespace-nowrap">日期區間</span>
      <input type="date" id="vendor-date-from" onchange="renderVendorContent()" class="w-[140px]">
      <span class="text-[13px] text-txt-3">—</span>
      <input type="date" id="vendor-date-to" onchange="renderVendorContent()" class="w-[140px]">
      <button class="btn btn-sm btn-ghost" onclick="clearVendorFilters()">✕ 清除</button>
    </div>
    <div class="overflow-x-auto mb-4">
      <div id="vendor-tabs" class="flex gap-0 border-b border-border min-w-max"></div>
    </div>
    <div id="vendor-summary-bar" class="mb-4"></div>
    <div id="vendor-content"></div>
    <div id="vendor-total-card" class="mt-6"></div>
  </div>

  <!-- 歷史價格查詢 -->
  <div id="sec-price" class="section">
    <div class="card">
      <div class="section-title">查詢歷史採購價格</div>
      <div class="flex gap-2 mb-4">
        <input type="text" id="price-search" placeholder="輸入商品名稱（如：北耆王、天麻、枸杞…）" class="flex-1" oninput="renderPriceSearch()">
        <select id="price-vendor" onchange="renderPriceSearch()" class="w-[160px]">
          <option value="">所有廠商</option>
        </select>
      </div>
      <div id="price-results"></div>
    </div>
  </div>

  <!-- 貨到付款查帳 -->
  <div id="sec-cod" class="section">
    <div class="card">
      <div class="section-title">新增代收款記錄</div>
      <div class="form-grid">
        <div class="form-group"><label>寄件日期 *</label><input type="date" id="cod-send-date"></div>
        <div class="form-group"><label>收件人 *</label><input type="text" id="cod-recipient" placeholder="例：王小明"></div>
        <div class="form-group"><label>物流編號 *</label><input type="text" id="cod-tracking" placeholder="例：123456789"></div>
        <div class="form-group"><label>收款金額 *</label><input type="number" id="cod-amount" placeholder="0" min="0"></div>
      </div>
      <div class="form-group mt-2">
        <label>備註</label>
        <input type="text" id="cod-note" placeholder="選填">
      </div>
      <div class="flex justify-end mt-4">
        <button class="btn btn-primary" onclick="addCodRecord()">新增記錄</button>
      </div>
    </div>

    <div class="card mt-4">
      <div class="flex justify-between items-center mb-4">
        <div class="section-title mb-0">代收款記錄</div>
        <div class="flex gap-2 items-center">
          <label class="flex items-center gap-1.5 text-xs cursor-pointer">
            <input type="checkbox" id="cod-show-uncollected" onchange="renderCodList()">
            只顯示未到帳
          </label>
        </div>
      </div>
      <div id="cod-list"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- 自訂對話框（取代原生 alert/confirm/prompt）-->
<div class="modal-bg" id="dialog-bg" style="display:none;" onclick="if(event.target===this)_dialogCancel()">
  <div class="modal w-[380px]">
    <h3 id="dialog-title"></h3>
    <div id="dialog-body" class="text-[13px] text-txt-2 leading-relaxed whitespace-pre-line"></div>
    <div id="dialog-input-wrap" class="hidden mt-3">
      <input type="text" id="dialog-input">
    </div>
    <div class="modal-actions" id="dialog-actions"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" style="display:none;">
  <div class="modal">
    <h3>標記付款日期</h3>
    <div class="form-group"><label>付款日期</label><input type="date" id="modal-date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmPaid()">確認付款</button>
    </div>
  </div>
</div>

<!-- 訂單詳情 Modal -->
<div class="modal-bg" id="detail-modal-bg" style="display:none;" onclick="if(event.target===this)closeDetail()">
  <div class="modal detail-modal">
    <div id="detail-content"></div>
    <div class="modal-actions" id="detail-actions"></div>
  </div>
</div>

<datalist id="vendor-list"></datalist>

<script src="js/dialog.js"></script>
<script src="js/data.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/orders.js"></script>
<script src="js/order-form.js"></script>
<script src="js/monthly.js"></script>
<script src="js/vendors.js"></script>
<script src="js/price.js"></script>
<script src="js/cod.js"></script>
<script src="js/app.js"></script>
</body>
</html>
