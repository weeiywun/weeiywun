<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iI0U4NzUxQSIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9InNlcmlmIiBmb250LXNpemU9IjE4IiBmb250LXdlaWdodD0iYm9sZCIgCiAgICAgICAgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPuW4szwvdGV4dD4KPC9zdmc+">
<title>惟元門市 — 進貨帳務管理系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  corePlugins: { preflight: false },
  important: false
}
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 密碼保護 -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:#faf9f7;z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#fff;border-radius:14px;padding:2.5rem 2rem;width:320px;max-width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);text-align:center;border:1px solid #e5e3de;">
    <div style="width:40px;height:40px;background:#d4691a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;font-family:serif;margin:0 auto .75rem;">帳</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:.2rem;color:#1a1917;">惟元門市</div>
    <div style="font-size:12px;color:#9e9b94;margin-bottom:1.5rem;">進貨帳務管理系統</div>
    <input type="password" id="auth-input" placeholder="密碼"
      style="width:100%;padding:.7rem 1rem;border:1px solid #d0cec8;border-radius:6px;font-size:14px;outline:none;box-sizing:border-box;text-align:center;letter-spacing:.15em;font-family:'Noto Sans TC',sans-serif;transition:border-color .12s;"
      onfocus="this.style.borderColor='#d4691a';this.style.boxShadow='0 0 0 3px rgba(212,105,26,.08)'"
      onblur="this.style.borderColor='#d0cec8';this.style.boxShadow='none'"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="color:#dc2626;font-size:12px;margin-top:.5rem;min-height:18px;"></div>
    <button onclick="checkAuth()"
      style="width:100%;margin-top:.75rem;padding:.7rem;background:#d4691a;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:.03em;transition:background .12s;font-family:'Noto Sans TC',sans-serif;"
      onmouseover="this.style.background='#c25e16'" onmouseout="this.style.background='#d4691a'">
      進入系統
    </button>
  </div>
</div>

<script src="js/auth.js"></script>

<div class="header">
  <div class="header-inner">
    <a class="logo logo-link" onclick="switchTab('add')" href="javascript:void(0)">
      <div class="logo-badge">帳</div>
      <div>
        <div class="logo-text">惟元門市 進貨管理</div>
        <div class="logo-sub">採購帳務系統 v4.7</div>
      </div>
    </a>
    <button id="admin-logout-btn" class="btn btn-sm btn-ghost" onclick="localStorage.removeItem('ww_auth');localStorage.removeItem('ww_employee_auth');location.reload();" style="font-size:12px;color:var(--text3);margin-left:4px;">登出</button>
    <div style="display:flex;gap:8px;align-items:center;" class="no-print">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">連線中…</span>
      </div>
      <button class="btn btn-sm" onclick="forceResync()" title="重新同步資料庫">↺ 同步</button>
      <button class="btn btn-sm" onclick="exportCSV()">↓ 匯出 CSV</button>
      <button class="btn btn-sm" onclick="backupData()">↓ 備份資料</button>
      <button class="btn btn-sm btn-primary" onclick="switchTab('add')">+ 新增訂單</button>
    </div>
  </div>
</div>

<div class="nav no-print">
  <div class="nav-inner">
    <button class="nav-tab active" data-tab="add" onclick="switchTab('add')">新增訂單</button>
    <button class="nav-tab" data-tab="orders" onclick="switchTab('orders')">訂單管理</button>
    <button class="nav-tab" data-tab="monthly" onclick="switchTab('monthly')">月底結算</button>
    <button class="nav-tab" data-tab="vendors" onclick="switchTab('vendors')">廠商彙總</button>
    <button class="nav-tab" data-tab="price" onclick="switchTab('price')">歷史價格查詢</button>
    <button class="nav-tab" data-tab="cod" onclick="switchTab('cod')">貨到付款查帳</button>
  </div>
</div>

<div class="main">

  <!-- 訂單管理 -->
  <div id="sec-orders" class="section">
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);" id="summary-cards"></div>
    <div class="card">
      <div class="filter-row">
        <input type="month" id="filter-month" onchange="renderOrders()" style="width:150px;">
        <input type="text" id="filter-vendor" placeholder="搜尋廠商…" oninput="renderOrders()" style="width:130px;">
        <input type="text" id="filter-orderid" placeholder="訂單編號…" oninput="renderOrders()" style="width:130px;">
        <input type="text" id="filter-item" placeholder="搜尋商品…" oninput="renderOrders()" style="width:130px;">
        <select id="filter-status" onchange="renderOrders()" style="width:120px;">
          <option value="">全部狀態</option>
          <option value="pending">未付款</option>
          <option value="paid">已付款</option>
        </select>
        <button class="btn btn-sm btn-ghost" onclick="clearFilters()">✕ 清除</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>訂單編號</th><th>廠商</th><th>品項（點擊展開）</th><th>訂單金額</th><th>狀態</th><th>付款日期</th>
          </tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 新增訂單 -->
  <div id="sec-add" class="section active">
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem;" id="add-summary-cards"></div>
    <div id="order-forms-container"></div>
    <button class="btn btn-sm" onclick="addOrderForm()" style="margin-bottom:1rem;">
      + 新增一張訂單
    </button>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:.5rem;">
      <button class="btn" onclick="resetAllForms()">清除全部</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveAllOrders()">儲存全部訂單</button>
    </div>
    <div id="save-msg" style="text-align:right;margin-top:8px;font-size:13px;color:var(--green);min-height:18px;"></div>
  </div>

  <!-- 月底結算 -->
  <div id="sec-monthly" class="section">
    <div class="print-title" id="print-title"></div>
    <div id="print-summary-page" style="display:none;"></div>
    <div class="card">
      <div class="filter-row no-print" style="margin-bottom:1.25rem;">
        <div class="form-group" style="flex:0 0 auto;"><label style="font-size:12px;font-weight:500;color:var(--text2);">選擇月份</label><input type="month" id="monthly-month" style="width:170px;"></div>
        <button class="btn btn-primary" onclick="renderMonthly()" style="margin-top:16px;">查詢</button>
        <div style="display:flex;gap:8px;margin-top:16px;margin-left:auto;">
          <button class="btn btn-success no-print" onclick="batchMarkPaid()">✓ 本月全數標記付款</button>
          <button class="btn btn-sm no-print" onclick="printMonthly()">⎙ 列印本月報表</button>
        </div>
      </div>
      <div id="monthly-summary"></div>
      <div id="monthly-table" style="overflow-x:auto;margin-top:1rem;"></div>
    </div>
  </div>

  <!-- 廠商彙總 -->
  <div id="sec-vendors" class="section">
    <div style="display:flex;gap:4px;margin-bottom:0;" id="vendor-category-tabs">
      <button class="vendor-cat-tab active" data-cat="中藥材" onclick="selectVendorCategory('中藥材')">中藥材</button>
      <button class="vendor-cat-tab" data-cat="包裝材" onclick="selectVendorCategory('包裝材')">包裝材</button>
      <button class="vendor-cat-tab" data-cat="其他" onclick="selectVendorCategory('其他')">其他</button>
      <button class="vendor-cat-tab" data-cat="物流" onclick="selectVendorCategory('物流')">物流</button>
      <button class="vendor-cat-tab" data-cat="大樓修繕" onclick="selectVendorCategory('大樓修繕')">大樓修繕</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:.75rem;margin-bottom:1rem;flex-wrap:wrap;">
      <input type="text" id="vendor-search" placeholder="搜尋廠商…" oninput="renderVendorTabs()" style="width:150px;">
      <div style="width:1px;height:20px;background:var(--border);margin:0 2px;"></div>
      <span style="font-size:12px;color:var(--text3);white-space:nowrap;">日期區間</span>
      <input type="date" id="vendor-date-from" onchange="renderVendorContent()" style="width:140px;">
      <span style="font-size:13px;color:var(--text3);">—</span>
      <input type="date" id="vendor-date-to" onchange="renderVendorContent()" style="width:140px;">
      <button class="btn btn-sm btn-ghost" onclick="clearVendorFilters()">✕ 清除</button>
    </div>
    <div style="overflow-x:auto;margin-bottom:1rem;">
      <div id="vendor-tabs" style="display:flex;gap:0;border-bottom:1px solid var(--border);min-width:max-content;"></div>
    </div>
    <div id="vendor-summary-bar" style="margin-bottom:1rem;"></div>
    <div id="vendor-content"></div>
    <div id="vendor-total-card" style="margin-top:1.5rem;"></div>
  </div>

  <!-- 歷史價格查詢 -->
  <div id="sec-price" class="section">
    <div class="card">
      <div class="section-title">查詢歷史採購價格</div>
      <div style="display:flex;gap:8px;margin-bottom:1rem;">
        <input type="text" id="price-search" placeholder="輸入商品名稱（如：北耆王、天麻、枸杞…）" style="flex:1;" oninput="renderPriceSearch()">
        <select id="price-vendor" onchange="renderPriceSearch()" style="width:160px;">
          <option value="">所有廠商</option>
        </select>
      </div>
      <div id="price-results"></div>
    </div>
  </div>

  <!-- 貨到付款查帳 -->
  <div id="sec-cod" class="section">
    <div class="card">
      <div class="section-title">新增代收款記錄</div>
      <div class="form-grid">
        <div class="form-group"><label>寄件日期 *</label><input type="date" id="cod-send-date"></div>
        <div class="form-group"><label>收件人 *</label><input type="text" id="cod-recipient" placeholder="例：王小明"></div>
        <div class="form-group"><label>物流編號 *</label><input type="text" id="cod-tracking" placeholder="例：123456789"></div>
        <div class="form-group"><label>收款金額 *</label><input type="number" id="cod-amount" placeholder="0" min="0"></div>
      </div>
      <div class="form-group" style="margin-top:8px;">
        <label>備註</label>
        <input type="text" id="cod-note" placeholder="選填">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:1rem;">
        <button class="btn btn-primary" onclick="addCodRecord()">新增記錄</button>
      </div>
    </div>

    <div class="card" style="margin-top:1rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div class="section-title" style="margin-bottom:0;">代收款記錄</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;">
            <input type="checkbox" id="cod-show-uncollected" onchange="renderCodList()">
            只顯示未到帳
          </label>
        </div>
      </div>
      <div id="cod-list"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- 自訂對話框（取代原生 alert/confirm/prompt）-->
<div class="modal-bg" id="dialog-bg" style="display:none;" onclick="if(event.target===this)_dialogCancel()">
  <div class="modal" style="width:380px;">
    <h3 id="dialog-title"></h3>
    <div id="dialog-body" style="font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-line;"></div>
    <div id="dialog-input-wrap" style="display:none;margin-top:.75rem;">
      <input type="text" id="dialog-input">
    </div>
    <div class="modal-actions" id="dialog-actions"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" style="display:none;">
  <div class="modal">
    <h3>標記付款日期</h3>
    <div class="form-group"><label>付款日期</label><input type="date" id="modal-date"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmPaid()">確認付款</button>
    </div>
  </div>
</div>

<!-- 訂單詳情 Modal -->
<div class="modal-bg" id="detail-modal-bg" style="display:none;" onclick="if(event.target===this)closeDetail()">
  <div class="modal detail-modal">
    <div id="detail-content"></div>
    <div class="modal-actions" id="detail-actions"></div>
  </div>
</div>

<datalist id="vendor-list"></datalist>

<script src="js/dialog.js"></script>
<script src="js/data.js"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/orders.js"></script>
<script src="js/order-form.js"></script>
<script src="js/monthly.js"></script>
<script src="js/vendors.js"></script>
<script src="js/price.js"></script>
<script src="js/cod.js"></script>
<script src="js/app.js"></script>
</body>
</html>
