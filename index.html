<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>惟元門市 — 進貨帳務管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f4f3f0;--border:#e5e3de;--border2:#d0cec8;
  --text:#1a1917;--text2:#6b6962;--text3:#9e9b94;--accent:#1a1917;
  --green:#16a34a;--green-bg:#f0fdf4;--amber:#b45309;--amber-bg:#fffbeb;
  --red:#dc2626;--red-bg:#fef2f2;--blue:#1d4ed8;--blue-bg:#eff6ff;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-badge{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.01em;}
.logo-sub{font-size:11px;color:var(--text3);margin-top:-2px;}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;}
.nav-tab{padding:12px 16px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500;}
.main{max-width:1200px;margin:0 auto;padding:1.5rem 2rem 3rem;}
.section{display:none;}.section.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;box-shadow:var(--shadow);}
.card+.card{margin-top:1rem;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;box-shadow:var(--shadow);}
.metric-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.metric-value{font-size:24px;font-weight:600;letter-spacing:-.02em;}
.metric-value.warn{color:var(--amber);}.metric-value.ok{color:var(--green);}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);font-family:inherit;transition:all .1s;white-space:nowrap;}
.btn:hover{background:var(--surface2);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500;}
.btn-primary:hover{background:#333;border-color:#333;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px;}
.btn-success{color:var(--green);border-color:#bbf7d0;background:var(--green-bg);}
.btn-success:hover{background:#dcfce7;}
.btn-danger{color:var(--red);border-color:#fecaca;background:var(--red-bg);}
.btn-danger:hover{background:#fee2e2;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface2);}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:12px;font-weight:500;color:var(--text2);}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:7px;font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .1s;}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,25,23,.06);}
input[readonly]{background:var(--surface2);color:var(--text2);cursor:default;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;background:var(--bg);}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.order-row{cursor:pointer;}
.order-row:hover td{background:#f0ede8 !important;}
.total-row td{font-weight:600;background:var(--surface2)!important;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-paid{background:var(--green-bg);color:var(--green);}
.filter-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1rem;}
.filter-row input,.filter-row select{width:auto;}
.items-header{display:grid;grid-template-columns:2.5fr 1fr 1fr 1fr 32px;gap:8px;padding:0 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.items-header span{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.item-row{display:grid;grid-template-columns:2.5fr 1fr 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:7px;}
.item-row input{padding:7px 9px;}
.remove-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s;}
.remove-btn:hover{background:var(--red-bg);border-color:#fecaca;color:var(--red);}
.order-footer{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;margin-top:.5rem;border-top:1px solid var(--border);}
.order-total-amount{font-size:26px;font-weight:600;letter-spacing:-.02em;}
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}
.sep{height:1px;background:var(--border);margin:1rem 0;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border-radius:12px;padding:1.5rem;width:340px;box-shadow:var(--shadow-md);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1rem;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;}
/* 訂單詳情 modal */
.detail-modal{width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.detail-modal h3{font-size:16px;font-weight:600;}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 1.5rem;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.detail-meta-item{display:flex;flex-direction:column;gap:2px;}
.detail-meta-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.detail-meta-value{font-size:13px;font-weight:500;}
.detail-items-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;}
.detail-items-table th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;background:var(--bg);}
.detail-items-table td{padding:9px 10px;border-bottom:1px solid var(--border);}
.detail-items-table tr:last-child td{border-bottom:none;}
.detail-total{display:flex;justify-content:flex-end;align-items:baseline;gap:8px;padding-top:.75rem;border-top:1px solid var(--border);}
/* ... 選單 */
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;}
.kebab-wrap{position:relative;}
.kebab-btn{width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:background .1s;letter-spacing:1px;}
.kebab-btn:hover{background:var(--surface2);}
.kebab-menu{position:absolute;right:0;top:36px;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:var(--shadow-md);min-width:150px;z-index:300;overflow:hidden;display:none;}
.kebab-menu.open{display:block;}
.kebab-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit;color:var(--text);}
.kebab-item:hover{background:var(--surface2);}
.kebab-item.danger{color:var(--red);}
.kebab-sep{height:1px;background:var(--border);margin:4px 0;}
/* 退換貨標記 */
.refund-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;background:#fdf2f8;color:#9d174d;border:1px solid #fbcfe8;}
/* 編輯模式 */
.edit-item-row{display:grid;grid-template-columns:2fr 1fr 0.8fr 0.7fr 1fr 28px;gap:6px;align-items:center;margin-bottom:7px;}
.edit-item-row input,.edit-item-row select{padding:6px 8px;font-size:13px;}
/* 品項列 with 單位 */
.item-row{display:grid;grid-template-columns:2.2fr 1fr 0.8fr 0.7fr 1fr 32px;gap:7px;align-items:start;margin-bottom:10px;}
.item-row input,.item-row select{padding:7px 9px;}
.price-hint{font-size:11px;color:var(--text3);margin-top:3px;min-height:15px;line-height:1.3;}
.price-hint.up{color:var(--red);}
.price-hint.down{color:var(--green);}
.price-hint.same{color:var(--amber);}
.vendor-tab{padding:9px 16px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;white-space:nowrap;}
.vendor-tab:hover{color:var(--text);}
.vendor-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500;}
.vendor-tab .unpaid-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin-left:5px;vertical-align:middle;}
.vendor-cat-tab{padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border2);border-bottom:none;background:var(--surface2);color:var(--text2);font-family:inherit;border-radius:7px 7px 0 0;transition:all .15s;}
.vendor-cat-tab:hover{background:var(--surface);color:var(--text);}
.vendor-cat-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

.pay-chip{display:inline-flex;align-items:center;padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--border2);cursor:pointer;transition:all .12s;color:var(--text2);background:var(--surface);}
.pay-chip:hover{border-color:var(--border2);background:var(--surface2);}
.pay-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
/* 價格查詢 */
.price-result{background:var(--surface2);border-radius:8px;padding:1rem;margin-top:1rem;}
.price-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.price-row:last-child{border-bottom:none;}
.price-item{font-weight:500;}
.price-meta{color:var(--text3);font-size:12px;}
.vendor-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:1rem;}
.vendor-header{padding:1.25rem;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);}
.vendor-name{font-size:16px;font-weight:600;}
.vendor-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.vendor-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.vendor-stat{background:var(--surface);padding:12px 1.25rem;}
.vendor-stat-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.vendor-stat-value{font-size:16px;font-weight:600;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;}
.sync-dot.synced{background:var(--green);}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.print-title{display:none;}
@media print{
  .header,.nav,.filter-row,.btn,.no-print{display:none!important;}
  .section{display:block!important;}
  #sec-orders,#sec-add,#sec-vendors,#sec-price,#sec-cod{display:none!important;}
  #sec-monthly{display:block!important;}
  body{background:#fff;margin:0;}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:.5rem;}
  .main{padding:0 1rem;}
  .print-title{display:block!important;font-size:18px;font-weight:600;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:2px solid #000;}
  #monthly-summary{margin-bottom:.5rem;}
  #print-summary-page{display:block!important;}
  #print-summary-page + *{page-break-before:always;}
}
</style>
</head>
<body>
<!-- 密碼保護 -->
<div id="auth-overlay" style="display:none;position:fixed;inset:0;background:#1a1a1a;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:2.5rem 2rem;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center;">
    <div style="font-size:28px;font-weight:700;margin-bottom:.25rem;">惟</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:.25rem;">惟元門市 進貨管理</div>
    <div style="font-size:12px;color:#888;margin-bottom:1.75rem;">請輸入密碼以繼續</div>
    <input type="password" id="auth-input" placeholder="請輸入密碼"
      style="width:100%;padding:.75rem 1rem;border:1.5px solid #ddd;border-radius:8px;font-size:15px;outline:none;box-sizing:border-box;text-align:center;letter-spacing:.2em;"
      onkeydown="if(event.key==='Enter')checkAuth()">
    <div id="auth-error" style="color:#e53e3e;font-size:12px;margin-top:.5rem;min-height:18px;"></div>
    <button onclick="checkAuth()"
      style="width:100%;margin-top:.75rem;padding:.75rem;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.05em;">
      進入系統
    </button>
  </div>
</div>

<script>
(function() {
  const PWD = '53251954';
  const KEY = 'ww_auth';
  const DAYS = 1;
  function isAuthed() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      return d && d.exp > Date.now();
    } catch { return false; }
  }
  function checkAuth() {
    const val = document.getElementById('auth-input').value;
    if (val === PWD) {
      localStorage.setItem(KEY, JSON.stringify({ exp: Date.now() + DAYS * 86400000 }));
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('auth-input').value = '';
    } else {
      const err = document.getElementById('auth-error');
      err.textContent = '密碼錯誤，請再試一次';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
      setTimeout(() => err.textContent = '', 3000);
    }
  }
  window.checkAuth = checkAuth;
  if (!isAuthed()) {
    document.getElementById('auth-overlay').style.display = 'flex';
    setTimeout(() => document.getElementById('auth-input').focus(), 100);
  } else {
    document.getElementById('auth-overlay').style.display = 'none';
  }
})();
</script>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-badge">惟</div>
      <div>
        <div class="logo-text">惟元門市 進貨管理</div>
        <div class="logo-sub">採購帳務系統 v4.5 ☁</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;" class="no-print">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-text">連線中…</span>
      </div>
      <button class="btn btn-sm" onclick="forceResync()" title="重新同步資料庫">↺ 同步</button>
      <button class="btn btn-sm" onclick="exportCSV()">↓ 匯出 CSV</button>
      <button class="btn btn-sm" onclick="backupData()">↓ 備份資料</button>
      <button class="btn btn-sm btn-primary" onclick="switchTab('add')">+ 新增訂單</button>
    </div>
  </div>
</div>

<div class="nav no-print">
  <div class="nav-inner">
    <button class="nav-tab active" data-tab="add" onclick="switchTab('add')">新增訂單</button>
    <button class="nav-tab" data-tab="orders" onclick="switchTab('orders')">訂單管理</button>
    <button class="nav-tab" data-tab="monthly" onclick="switchTab('monthly')">月底結算</button>
    <button class="nav-tab" data-tab="vendors" onclick="switchTab('vendors')">廠商彙總</button>
    <button class="nav-tab" data-tab="price" onclick="switchTab('price')">歷史價格查詢</button>
    <button class="nav-tab" data-tab="cod" onclick="switchTab('cod')">貨到付款查帳</button>
  </div>
</div>

<div class="main">

  <!-- 訂單管理 -->
  <div id="sec-orders" class="section">
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);" id="summary-cards"></div>
    <div class="card">
      <div class="filter-row">
        <input type="month" id="filter-month" onchange="renderOrders()" style="width:150px;">
        <input type="text" id="filter-vendor" placeholder="搜尋廠商…" oninput="renderOrders()" style="width:130px;">
        <input type="text" id="filter-orderid" placeholder="訂單編號…" oninput="renderOrders()" style="width:130px;">
        <input type="text" id="filter-item" placeholder="搜尋商品…" oninput="renderOrders()" style="width:130px;">
        <select id="filter-status" onchange="renderOrders()" style="width:120px;">
          <option value="">全部狀態</option>
          <option value="pending">未付款</option>
          <option value="paid">已付款</option>
        </select>
        <button class="btn btn-sm btn-ghost" onclick="clearFilters()">✕ 清除</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>日期</th><th>訂單編號</th><th>廠商</th><th>品項（點擊展開）</th><th>訂單金額</th><th>狀態</th><th>付款日期</th>
          </tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 新增訂單 -->
  <div id="sec-add" class="section active">

    <!-- 本月摘要小卡 -->
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.25rem;" id="add-summary-cards"></div>

    <!-- 訂單清單（可新增多張）-->
    <div id="order-forms-container"></div>

    <button class="btn btn-sm" onclick="addOrderForm()" style="margin-bottom:1rem;">
      + 新增一張訂單
    </button>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:.5rem;">
      <button class="btn" onclick="resetAllForms()">清除全部</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveAllOrders()">儲存全部訂單</button>
    </div>
    <div id="save-msg" style="text-align:right;margin-top:8px;font-size:13px;color:var(--green);min-height:18px;"></div>
  </div>

  <!-- 月底結算 -->
  <div id="sec-monthly" class="section">
    <div class="print-title" id="print-title"></div>
    <!-- 列印第一頁：未付款快速總覽（僅列印時顯示）-->
    <div id="print-summary-page" style="display:none;"></div>
    <div class="card">

// ── 載入訂單（從 Supabase 讀取）──────────────────────
async function loadOrders() {
  setSyncStatus('syncing', '載入中…');
  try {
    // 先讀訂單主表
    const ordersData = await sbFetch('orders?select=*&order=date.asc&limit=10000');
    // 再讀品項（分批讀取避免 1000 筆限制）
    let itemsData = [];
    let offset = 0;
    const batchSize = 1000;
    while (true) {
      const batch = await sbFetch(`order_items?select=*&order=sort_order.asc&limit=${batchSize}&offset=${offset}`, {
        headers: { 'Range-Unit': 'items', 'Range': `${offset}-${offset + batchSize - 1}` }
      });
      if (!batch || batch.length === 0) break;
      itemsData = itemsData.concat(batch);
      if (batch.length < batchSize) break;
      offset += batchSize;
    }

    // 組合
    const itemMap = {};
    itemsData.forEach(i => {
      if (!itemMap[i.order_id]) itemMap[i.order_id] = [];
      itemMap[i.order_id].push({ name: i.name, qty: i.qty, price: i.price, unit: i.unit || '斤' });
    });

    orders = ordersData.map(o => ({
      id: o.id,
      date: o.date,
      orderId: o.order_id,
      vendor: o.vendor,
      items: itemMap[o.id] || [],
      total: Number(o.total),
      status: o.status,
      paidDate: o.paid_date || '',
      payMethod: o.pay_method || '',
      payNote: o.pay_note || '',
      note: o.note || '',
      type: o.type || '',
      refundOf: o.refund_of || ''
    }));

    if (orders.length === 0) {
      // 首次使用：匯入歷史資料
      setSyncStatus('syncing', '首次匯入歷史資料…');
      await importHistory();
    } else if (orders.length < HISTORY.length) {
      // 資料不完整：補齊缺少的部分
      setSyncStatus('syncing', `資料不完整（${orders.length}/${HISTORY.length}），補齊中…`);
      await importHistory();
    } else {
      setSyncStatus('synced', `已同步 ${orders.length} 筆`);
    }
    supabaseReady = true;
  } catch (e) {
    console.error('Supabase 載入失敗，改用本地資料:', e);
    setSyncStatus('error', '離線模式');
    // 降級到 localStorage
    const saved = localStorage.getItem('weiyuan_orders_v1');
    orders = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(HISTORY));
    supabaseReady = false;
  }
  renderOrders();
  renderSummary();
}

async function importHistory() {
  const hist = JSON.parse(JSON.stringify(HISTORY));

  // 取得資料庫中已有的 id 清單
  const existing = await sbFetch('orders?select=id');
  const existingIds = new Set((existing || []).map(o => o.id));

  // 只匯入缺少的訂單
  const missing = hist.filter(o => !existingIds.has(o.id));
  const total = missing.length;

  if (total === 0) {
    orders = hist;
    setSyncStatus('synced', `已同步 ${hist.length} 筆（無需補齊）`);
    return;
  }

  let done = 0;
  let failed = [];

  for (const o of missing) {
    try {
      await insertOrder(o);
      done++;
      if (done % 5 === 0 || done === total) {
        setSyncStatus('syncing', `匯入中 ${done}/${total}…`);
      }
    } catch(e) {
      console.warn('匯入失敗，稍後重試:', o.id, e.message);
      failed.push(o);
    }
  }

  // 重試失敗的
  if (failed.length > 0) {
    setSyncStatus('syncing', `重試 ${failed.length} 筆…`);
    for (const o of failed) {
      try {
        await insertOrder(o);
      } catch(e) {
        console.error('重試仍失敗:', o.id, e.message);
      }
    }
  }

  orders = hist;
  setSyncStatus('synced', `已匯入完成，共 ${hist.length} 筆`);
}

// ── persist（寫入 Supabase 或降級 localStorage）────────
async function persist(changedOrder, action) {
  if (!supabaseReady) {
    localStorage.setItem('weiyuan_orders_v1', JSON.stringify(orders));
    return;
  }
  setSyncStatus('syncing', '儲存中…');
  try {
    if (action === 'insert') await insertOrder(changedOrder);
    else if (action === 'update') await updateOrder(changedOrder);
    else if (action === 'delete') await deleteFromDB(changedOrder);
    setSyncStatus('synced', `已同步`);
  } catch(e) {
    setSyncStatus('error', '同步失敗，請重試');
    console.error(e);
    throw e;
  }
}

    <div class="metric"><div class="metric-label">本月進貨金額</div><div class="metric-value">$${mTotal.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">累計未付款</div><div class="metric-value warn">$${unpaid.toLocaleString()}</div></div>`;

function renderOrders() {
  renderSummary();
  const fm = document.getElementById('filter-month').value;
  const fv = document.getElementById('filter-vendor').value.toLowerCase();
  const fo = document.getElementById('filter-orderid').value.toLowerCase();
  const fi = document.getElementById('filter-item').value.toLowerCase();
  const fs = document.getElementById('filter-status').value;
  let list = orders.filter(o => {
    if (fm && !o.date.startsWith(fm)) return false;
    if (fv && !o.vendor.toLowerCase().includes(fv)) return false;
    if (fo && !(o.orderId||'').toLowerCase().includes(fo)) return false;
    if (fi && !o.items.some(i => i.name.toLowerCase().includes(fi))) return false;
    if (fs && o.status !== fs) return false;
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date));
  const tb = document.getElementById('orders-tbody');
  if (!list.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">沒有符合的訂單</td></tr>'; return; }
  tb.innerHTML = list.map(o => {
    const itemSummary = o.items.length === 1
      ? `${o.items[0].name}　${o.items[0].qty} ${o.items[0].unit||'斤'}`
      : `${o.items[0].name} 等 ${o.items.length} 項`;
    return `<tr class="order-row" onclick="showDetail('${o.id}')" title="點擊查看詳情">

      <td class="mono">${o.orderId||'—'}</td>

        ${o.note?`<span style="font-size:11px;color:var(--text3);margin-left:6px;">📝</span>`:''}
      </td>
      <td style="font-weight:600;">$${o.total.toLocaleString()}</td>

}

function recalcEdit() {
  let total = 0;
  document.querySelectorAll('#edit-items-container .edit-item-row').forEach(row => {
    const idx = row.id.replace('edit-item-','');
    const p = parseFloat(document.getElementById('eprice-'+idx)?.value)||0;
    const q = parseFloat(document.getElementById('eqty-'+idx)?.value)||0;
    const sub = p * q;
    const subEl = document.getElementById('esub-'+idx);
    if (subEl) subEl.value = sub > 0 ? '$'+Math.round(sub).toLocaleString() : '';
    total += sub;
  });
  const el = document.getElementById('edit-total');
  if (el) el.textContent = '$' + Math.round(total).toLocaleString();
}

async function saveEdit(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const items = [];
  document.querySelectorAll('#edit-items-container .edit-item-row').forEach(row => {
    const idx = row.id.replace('edit-item-','');
    const name = document.getElementById('ename-'+idx)?.value.trim();
    const price = parseFloat(document.getElementById('eprice-'+idx)?.value)||0;
    const qty = parseFloat(document.getElementById('eqty-'+idx)?.value)||0;
    const unit = document.getElementById('eunit-'+idx)?.value||'斤';
    if (name) items.push({name, price, qty, unit});
  });
  if (!items.length) { alert('請至少保留一個品項'); return; }
  o.date = document.getElementById('e-date').value;
  o.orderId = document.getElementById('e-orderid').value.trim();
  o.vendor = document.getElementById('e-vendor').value.trim();
  o.items = items;
  o.total = Math.round(items.reduce((s,i) => s+i.price*i.qty, 0));
  o.status = document.getElementById('e-status').value;
  o.paidDate = document.getElementById('e-paiddate').value;
  o.payMethod = document.getElementById('e-paymethod').value;
  o.payNote = document.getElementById('e-paynote').value;
  o.note = document.getElementById('e-note').value;
  await persist(o, 'update');
  renderOrders();
  toast('✓ 訂單已更新');
  renderDetail(id, false);
}

async function createRefund(id) {
  const o = orders.find(x => x.id === id);
  if (!o) return;
  if (!confirm(`要為「${o.vendor}／${o.orderId||o.date}」建立退換貨記錄嗎？\n\n系統會複製此訂單並標記為退換貨，您可以在編輯模式修改退貨品項與數量。`)) return;
  const refund = {
    ...JSON.parse(JSON.stringify(o)),
    id: Date.now().toString(),
    type: 'refund',
    refundOf: id,
    status: 'paid',
    paidDate: new Date().toISOString().slice(0,10),
    note: `退換貨（原訂單：${o.orderId||o.date}）${o.note?'　'+o.note:''}`,
  };
  orders.push(refund);
  await persist(refund, 'insert');
  closeDetail();
  renderOrders();
  toast('↩ 退換貨記錄已建立，請點擊查看並修改品項');
  setTimeout(() => showDetail(refund.id), 300);
}

function buildVendorSelect(selectId) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  // 已知廠商（依分類）
  const known = VENDOR_CATEGORIES;
  // 從訂單中找到不在分類裡的廠商
  const allCatVendors = new Set(Object.values(known).flat());
  const extraVendors = [...new Set(orders.map(o=>o.vendor))].filter(v=>!allCatVendors.has(v)).sort();

  let html = '<option value="">選擇廠商…</option>';
  for (const [cat, vendors] of Object.entries(known)) {
    html += `<optgroup label="── ${cat} ──">`;
    vendors.forEach(v => { html += `<option value="${v}">${v}</option>`; });
    html += '</optgroup>';
  }
  if (extraVendors.length) {
    html += '<optgroup label="── 其他 ──">';
    extraVendors.forEach(v => { html += `<option value="${v}">${v}</option>`; });
    html += '</optgroup>';
  }
  // 允許手動輸入新廠商
  html += '<option value="__new__">＋ 新廠商（請手動填寫）</option>';
  sel.innerHTML = html;
}

  const container = document.getElementById('order-forms-container');
  container.insertAdjacentHTML('beforeend', createOrderFormHTML(fid));
  buildVendorSelect('f-vendor-sel-' + fid);

    const sel = document.getElementById('f-vendor-sel-' + fid);

  for (let i = 0; i < 8; i++) addItemRowTo(fid, false);

}

  if (!itemCounters[fid]) itemCounters[fid] = 0;

      <option value="斤">斤</option><option value="公斤">公斤</option>

function showPriceHintFor(id) {
  const nameEl = document.getElementById('iname-'+id);
  const hintEl = document.getElementById('phint-'+id);
  const priceEl = document.getElementById('iprice-'+id);
  if (!nameEl || !hintEl) return;
  const q = nameEl.value.trim().toLowerCase();
  if (!q || q.length < 2) { hintEl.textContent = ''; return; }
  const hits = [];
  orders.forEach(o => {
    o.items.forEach(i => {
      if (i.name.toLowerCase().includes(q) && i.price > 0)
        hits.push({ date: o.date, name: i.name, price: i.price, vendor: o.vendor });
    });
  });
  if (!hits.length) { hintEl.textContent = ''; return; }
  hits.sort((a,b) => b.date.localeCompare(a.date));
  const last = hits[0];
  const curPrice = parseFloat(priceEl?.value) || 0;
  let cls = 'price-hint', arrow = '';
  if (curPrice > 0) {
    if (curPrice > last.price) { cls = 'price-hint up'; arrow = ' ▲'; }
    else if (curPrice < last.price) { cls = 'price-hint down'; arrow = ' ▼'; }
    else { cls = 'price-hint same'; arrow = ' ＝'; }
  }
  hintEl.className = cls;
  hintEl.textContent = `上次：$${last.price.toLocaleString()}／${last.date}（${last.vendor}）${arrow}`;
}

function calcTotalFor(fid) {
  let total = 0;
  const container = document.getElementById('items-container-' + fid);
  if (!container) return;
  container.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item-','');
    const p = parseFloat(document.getElementById('iprice-'+id)?.value)||0;
    const q = parseFloat(document.getElementById('iqty-'+id)?.value)||0;
    const sub = p*q;
    const subEl = document.getElementById('isub-'+id);
    if (subEl) subEl.value = sub > 0 ? '$'+sub.toLocaleString() : '';
    total += sub;
  });
  const totalEl = document.getElementById('order-total-' + fid);
  if (totalEl) totalEl.textContent = '$' + Math.round(total).toLocaleString();
}

async function saveAllOrders() {
  const forms = document.querySelectorAll('.order-form-card');
  if (!forms.length) { alert('沒有訂單可儲存'); return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  let savedCount = 0;
  let errors = [];

  for (const form of forms) {
    const fid = form.id.replace('oform-','');
    const date    = document.getElementById('f-date-' + fid)?.value;
    const orderId = document.getElementById('f-orderid-' + fid)?.value.trim() || '';
    const vendor  = getVendorForForm(fid);
    const note    = document.getElementById('f-note-' + fid)?.value.trim() || '';
    const orderNote = document.getElementById('f-order-note-' + fid)?.value.trim() || '';

    if (!date || !vendor) {
      errors.push(`訂單 #${fid}：請填寫日期與廠商`);
      continue;
    }

    const items = [];
    document.getElementById('items-container-' + fid)?.querySelectorAll('.item-row').forEach(row => {
      const id = row.id.replace('item-','');
      const name  = document.getElementById('iname-'+id)?.value.trim();
      const price = parseFloat(document.getElementById('iprice-'+id)?.value)||0;
      const qty   = parseFloat(document.getElementById('iqty-'+id)?.value)||0;
      const unit  = document.getElementById('iunit-'+id)?.value || '斤';
      if (name) items.push({name, price, qty, unit});
    });

    if (!items.length) {
      errors.push(`訂單 #${fid}（${vendor}）：請至少填一個品項`);
      continue;
    }

    const total    = Math.round(items.reduce((s,i) => s+i.price*i.qty, 0));
    const isPaid   = document.getElementById('f-paid-' + fid)?.checked;
    const paidDate = isPaid ? (document.getElementById('f-paid-date-' + fid)?.value || date) : '';
    const payMethod = document.querySelector(`input[name="paymethod-${fid}"]:checked`)?.value || '';
    const payNote  = document.getElementById('f-pay-note-' + fid)?.value.trim() || '';

    const newOrder = {
      id: (Date.now() + savedCount).toString(),
      date, orderId, vendor, items, total,
      status: isPaid ? 'paid' : 'pending',
      paidDate, payMethod, payNote,
      note: orderNote || note
    };

    try {
      orders.push(newOrder);
      await persist(newOrder, 'insert');
      savedCount++;
    } catch(e) {
      errors.push(`訂單 #${fid}（${vendor}）儲存失敗`);
    }
  }

  btn.disabled = false; btn.textContent = '儲存全部訂單';

  if (errors.length) {
    alert('部分失敗：\n' + errors.join('\n'));
  }
  if (savedCount > 0) {
    toast(`✓ 已儲存 ${savedCount} 張訂單`);
    document.getElementById('save-msg').textContent = `✓ 已儲存 ${savedCount} 張訂單`;
    setTimeout(() => document.getElementById('save-msg').textContent = '', 4000);
    renderOrders(); renderSummary();
    resetAllForms();
  }
}

// ── 月底結算 ──────────────────────────────────────────
function renderMonthly() {
  const ym = document.getElementById('monthly-month').value;
  if (!ym) { document.getElementById('monthly-summary').innerHTML = '<div class="empty">請選擇月份</div>'; return; }
  const list = orders.filter(o => o.date.startsWith(ym));
  if (!list.length) {
    document.getElementById('monthly-summary').innerHTML = `<div class="empty">${ym} 尚無訂單</div>`;
    document.getElementById('monthly-table').innerHTML = '';
    return;
  }
  const total  = list.reduce((s,o) => s+o.total, 0);
  const paid   = list.filter(o=>o.status==='paid').reduce((s,o) => s+o.total, 0);
  const unpaid = total - paid;

  // 廠商家數
  const vendorSet = new Set(list.map(o=>o.vendor));

  document.getElementById('monthly-summary').innerHTML = `
    <div class="metrics" style="margin-bottom:1.25rem;">
      <div class="metric"><div class="metric-label">廠商家數</div><div class="metric-value">${vendorSet.size}</div></div>
      <div class="metric"><div class="metric-label">月份總金額</div><div class="metric-value">$${total.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">已付款</div><div class="metric-value ok">$${paid.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">待付款</div><div class="metric-value warn">$${unpaid.toLocaleString()}</div></div>
    </div>`;

  // 依廠商分組
  const vendorMap = {};
  list.forEach(o => {
    if (!vendorMap[o.vendor]) vendorMap[o.vendor] = { orders:[], total:0, paid:0, unpaid:0 };
    vendorMap[o.vendor].orders.push(o);
    vendorMap[o.vendor].total += o.total;
    if (o.status==='paid') vendorMap[o.vendor].paid += o.total;
    else vendorMap[o.vendor].unpaid += o.total;
  });

  // 排序：未付款廠商在前，已付款在後；各組內依 VENDOR_ORDER
  let vendorNames = Object.keys(vendorMap);
  const unpaidVendors = sortVendors(vendorNames.filter(v => vendorMap[v].unpaid > 0));
  const paidVendors   = sortVendors(vendorNames.filter(v => vendorMap[v].unpaid === 0));
  vendorNames = [...unpaidVendors, ...paidVendors];

  const vendorBlocks = vendorNames.map((v, idx) => {
    const vd = vendorMap[v];
    const isAllPaid = vd.unpaid === 0;
    const orderRows = vd.orders
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(o => `
        <tr class="order-row" onclick="showDetail('${o.id}')" style="cursor:pointer;">
          <td>${o.date}</td>
          <td class="mono">${o.orderId||'—'}</td>
          <td style="font-size:12px;color:var(--text2);">${o.items.map(i => {
            const isNeg = Math.round(i.qty * i.price) < 0;
            return isNeg ? `<span style="color:#e53e3e;">↩${i.name}</span>` : i.name;
          }).join('、')}</td>
          <td style="font-weight:600;">$${o.total.toLocaleString()}</td>
          <td><span class="badge ${o.status==='paid'?'badge-paid':'badge-pending'}">${o.status==='paid'?'已付款':'未付款'}</span></td>
          <td style="font-size:12px;color:var(--text3);">${o.paidDate||'—'}</td>
          <td class="no-print">${o.status==='pending'
            ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();openModal('${o.id}');setTimeout(renderMonthly,600)">標記付款</button>`
            : ''}</td>
        </tr>`).join('');

    const dashedTop = idx > 0
      ? `border-top:2px dashed #bbb;margin-top:1.25rem;padding-top:1.25rem;`
      : '';

    return `
      <div style="${dashedTop}break-inside:avoid;page-break-inside:avoid;">
        <div style="margin-bottom:.5rem;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);${isAllPaid?'opacity:.75':''}">
          <!-- 廠商標題列 -->
          <div style="display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.25rem;background:${isAllPaid?'var(--surface2)':'var(--surface)'};border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:10px;">
              <span style="font-size:15px;font-weight:600;">${v}</span>
              <span style="font-size:12px;color:var(--text3);">${vd.orders.length} 筆訂單</span>
              ${isAllPaid ? '<span class="badge badge-paid">全數付清</span>' : `<span class="badge badge-pending">待付 $${vd.unpaid.toLocaleString()}</span>`}
            </div>
            <div style="text-align:right;">
              <div style="font-size:11px;color:var(--text3);">本月採購</div>
              <div style="font-size:18px;font-weight:600;">$${vd.total.toLocaleString()}</div>
            </div>
          </div>
          <!-- 訂單明細 -->
          <div style="overflow-x:auto;">
            <table>
              <thead><tr>
                <th>日期</th><th>訂單編號</th><th>商品</th><th>金額</th><th>狀態</th><th>付款日期</th><th class="no-print">操作</th>
              </tr></thead>
              <tbody>${orderRows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }).join('');

  // 合計列
  const totalRow = `
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:1.5rem;padding:.75rem 1.25rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-top:.5rem;">
      <span style="font-size:13px;color:var(--text2);">本月合計</span>
      <span style="font-size:22px;font-weight:600;">$${total.toLocaleString()}</span>
    </div>`;

  document.getElementById('monthly-table').innerHTML = vendorBlocks + totalRow;
}

function printMonthly() {
  if (!document.getElementById('monthly-table').innerHTML.trim()) { alert('請先選擇月份並按查詢'); return; }
  const ym = document.getElementById('monthly-month').value;
  const [y, m] = ym.split('-');

  // 列印前確認對話框
  const printer = prompt(
    `確認列印【惟元門市 ${y} 年 ${parseInt(m)} 月 進貨報表】\n\n請確認資料無誤後，輸入列印人姓名：`,
    ''
  );
  if (printer === null) return; // 取消
  if (!printer.trim()) { alert('請填寫列印人姓名'); return; }

  const now = new Date();
  const printTime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}  ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('print-title').innerHTML =
    `<div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <span>惟元門市 ${y} 年 ${parseInt(m)} 月 進貨報表</span>
      <span style="font-size:12px;font-weight:400;color:#555;text-align:right;line-height:1.6;">
        列印人：${printer.trim()}<br>列印時間：${printTime}
      </span>
    </div>`;

  // 建立第一頁：未付款快速總覽
  const list = orders.filter(o => o.date.startsWith(ym));
  const total  = list.reduce((s,o) => s+o.total, 0);
  const paid   = list.filter(o=>o.status==='paid').reduce((s,o) => s+o.total, 0);
  const unpaid = total - paid;

  const vendorMap = {};
  list.forEach(o => {
    if (!vendorMap[o.vendor]) vendorMap[o.vendor] = { orders:[], unpaid:0 };
    vendorMap[o.vendor].orders.push(o);
    if (o.status !== 'paid') vendorMap[o.vendor].unpaid += o.total;
  });

  const unpaidVendors = sortVendors(
    Object.keys(vendorMap).filter(v => vendorMap[v].unpaid > 0)
  );

  const catGroups = {};
  // 依照固定順序建立分類（其他在物流前）
  ['中藥材','包裝材','其他','物流','大樓修繕'].forEach(cat => { catGroups[cat] = []; });
  unpaidVendors.forEach(v => {
    let cat = '其他';
    for (const [c, vlist] of Object.entries(VENDOR_CATEGORIES)) {
      if (vlist.includes(v)) { cat = c; break; }
    }
    catGroups[cat].push(v);
  });

  const unpaidOrderCount = list.filter(o=>o.status!=='paid').length;
  const vendorUnpaidCount = unpaidVendors.length;

  // 統一欄寬的 table style
  const tableStyle = `width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;`;
  const colDefs = `<colgroup>
    <col style="width:18%;">
    <col style="width:18%;">
    <col style="width:32%;">
    <col style="width:16%;">
    <col style="width:16%;">
  </colgroup>`;
  const thStyle = `padding:6px 8px;border:1px solid #ddd;font-weight:600;background:#f5f5f5;`;
  const tdStyle = `padding:5px 8px;border:1px solid #ddd;`;

  let summaryHTML = `
    <div style="margin-bottom:1rem;">
      <div style="font-size:12px;font-weight:600;color:#666;margin-bottom:.5rem;letter-spacing:.05em;">未付款快速總覽</div>
      <div style="display:flex;gap:2rem;margin-bottom:1rem;padding:.75rem 1rem;background:#f8f8f8;border:1px solid #ddd;border-radius:6px;">
        <div><div style="font-size:11px;color:#888;">未付款廠商</div><div style="font-size:22px;font-weight:700;">${vendorUnpaidCount} 家</div></div>
        <div><div style="font-size:11px;color:#888;">未付款訂單</div><div style="font-size:22px;font-weight:700;">${unpaidOrderCount} 筆</div></div>
        <div style="margin-left:auto;text-align:right;"><div style="font-size:11px;color:#888;">未付款總額</div><div style="font-size:22px;font-weight:700;">$${unpaid.toLocaleString()}</div></div>
      </div>`;

  if (unpaidVendors.length === 0) {
    summaryHTML += `<div style="padding:1.5rem;text-align:center;color:#4caf50;font-weight:600;font-size:15px;border:1px solid #c8e6c9;border-radius:6px;background:#f1f8e9;">✓ 本月所有廠商均已付清</div>`;
  } else {
    // 每個分類都輸出（包含無資料的），保持版面一致
    for (const [cat, vendors] of Object.entries(catGroups)) {
      if (cat === '其他' && vendors.length === 0) continue; // 其他分類若無資料則跳過
      summaryHTML += `
        <div style="margin-bottom:.75rem;">
          <div style="font-size:11px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.35rem;padding-bottom:.2rem;border-bottom:1px solid #ddd;">${cat}</div>
          <table style="${tableStyle}">
            ${colDefs}
            <thead>
              <tr>
                <th style="text-align:left;${thStyle}">廠商</th>
                <th style="text-align:center;${thStyle}">未付款訂單數</th>
                <th style="text-align:right;${thStyle}">未付款總額</th>
                <th style="text-align:center;${thStyle}">現金／匯款</th>
                <th style="text-align:center;${thStyle}">支票</th>
              </tr>
            </thead>
            <tbody>
              ${vendors.length === 0
                ? `<tr><td colspan="5" style="text-align:center;${tdStyle}color:#aaa;">— 本月無未付款 —</td></tr>`
                : vendors.map(v => {
                    const vd = vendorMap[v];
                    const unpaidOrders = vd.orders.filter(o=>o.status!=='paid');
                    return `<tr>
                      <td style="${tdStyle}font-weight:500;">${v}</td>
                      <td style="text-align:center;${tdStyle}">${unpaidOrders.length} 筆</td>
                      <td style="text-align:right;${tdStyle}font-weight:600;">$${vd.unpaid.toLocaleString()}</td>
                      <td style="${tdStyle}"></td>
                      <td style="${tdStyle}"></td>
                    </tr>`;
                  }).join('')
              }
            </tbody>
          </table>
        </div>`;
    }
  }

  summaryHTML += `</div>`;
  document.getElementById('print-summary-page').innerHTML = summaryHTML;
  window.print();
  setTimeout(() => {
    document.getElementById('print-summary-page').innerHTML = '';
    document.getElementById('print-title').innerHTML = '';
  }, 2000);
}

// ── 廠商分類定義 ──────────────────────────────────────
const VENDOR_CATEGORIES = {
  '中藥材': ['利仁','廣生堂','和盛記','界順','明(坤贊)','三興','仁記','銓崧','中冬金元','鴻龍','信惠虹','源山','集昌','漢良堂','德合記','河記','駿賀','養蜂場','港香蘭'],
  '包裝材': ['大新','豐甲','富田喬','原祥塑膠','捷可印','紙箱龍','南成','宏笙','尚景印刷'],
  '物流':   ['新竹貨運','宅配通'],
  '大樓修繕': ['新光保全','興承','崇友'],
};
let currentCategory = '中藥材';

function selectVendorCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.vendor-cat-tab').forEach(el =>
    el.classList.toggle('active', el.dataset.cat === cat)
  );
  currentVendor = null;
  renderVendorTabs();
}

// ── 廠商彙總（頁簽版）────────────────────────────────
let currentVendor = null;

function clearVendorFilters() {
  document.getElementById('vendor-search').value = '';
  document.getElementById('vendor-date-from').value = '';
  document.getElementById('vendor-date-to').value = '';
  renderVendorTabs();
}

function getVendorMap() {
  const dateFrom = document.getElementById('vendor-date-from').value;
  const dateTo   = document.getElementById('vendor-date-to').value;
  const map = {};
  orders.forEach(o => {
    if (dateFrom && o.date < dateFrom) return;
    if (dateTo   && o.date > dateTo)   return;
    if (!map[o.vendor]) map[o.vendor] = { orders:[], total:0, paid:0, unpaid:0 };
    map[o.vendor].orders.push(o);
    map[o.vendor].total += o.total;
    if (o.status === 'paid') map[o.vendor].paid += o.total;
    else map[o.vendor].unpaid += o.total;
  });
  return map;
}

function renderVendors() { renderVendorTabs(); }

function renderVendorTabs() {
  const search = document.getElementById('vendor-search').value.toLowerCase();
  const map = getVendorMap();
  const allCatVendors = new Set(Object.values(VENDOR_CATEGORIES).flat());

  let names;
  if (currentCategory === '其他') {
    // 其他：不在四大分類中的廠商，依資料排序
    names = Object.keys(map)
      .filter(v => !allCatVendors.has(v) && (!search || v.toLowerCase().includes(search)))
      .sort((a,b) => a.localeCompare(b, 'zh-TW'));
  } else {
    const catVendors = VENDOR_CATEGORIES[currentCategory] || [];
    names = catVendors.filter(v =>
      map[v] && (!search || v.toLowerCase().includes(search))
    );
    // 搜尋時也顯示其他分類符合的廠商
    if (search) {
      Object.keys(map).forEach(v => {
        if (!allCatVendors.has(v) && v.toLowerCase().includes(search) && !names.includes(v))
          names.push(v);
      });
    }
  }

  if (!names.length) {
    document.getElementById('vendor-tabs').innerHTML = '';
    document.getElementById('vendor-summary-bar').innerHTML = '';
    document.getElementById('vendor-content').innerHTML = '<div class="empty">此分類沒有廠商資料</div>';
    document.getElementById('vendor-total-card').innerHTML = '';
    return;
  }

  if (!currentVendor || !names.includes(currentVendor)) {
    currentVendor = names[0];
  }

  document.getElementById('vendor-tabs').innerHTML = names.map(v => {
    const safeV = v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const hasUnpaid = map[v] && map[v].unpaid > 0;
    return `<button class="vendor-tab ${v===currentVendor?'active':''}" onclick="selectVendorTab('${safeV}')">${v}${hasUnpaid?'<span class="unpaid-dot"></span>':''}</button>`;
  }).join('');

  renderVendorContent();
  renderVendorTotalCard();
}

function renderVendorTotalCard() {
  const map = getVendorMap();
  if (!currentVendor || !map[currentVendor]) {
    document.getElementById('vendor-total-card').innerHTML = '';
    return;
  }
  const d = map[currentVendor];
  document.getElementById('vendor-total-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.25rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);">
      <span style="font-size:13px;font-weight:600;color:var(--text);">${currentVendor}</span>
      <span style="font-size:13px;color:var(--text2);">累計 <b>${d.orders.length}</b> 筆</span>
      <span style="font-size:16px;font-weight:600;">$${d.total.toLocaleString()}</span>
    </div>`;
}

function selectVendorTab(v) {
  currentVendor = v;
  document.querySelectorAll('.vendor-tab').forEach(el => {
    const label = el.childNodes[0].textContent.trim();
    el.classList.toggle('active', label === v);
  });
  renderVendorContent();
  renderVendorTotalCard();
}

function renderVendorContent() {
  const map = getVendorMap();
  const dateFrom = document.getElementById('vendor-date-from').value;
  const dateTo   = document.getElementById('vendor-date-to').value;
  const hasRange = dateFrom || dateTo;

  if (!currentVendor || !map[currentVendor]) {
    document.getElementById('vendor-content').innerHTML = '<div class="empty">請選擇廠商</div>';
    document.getElementById('vendor-summary-bar').innerHTML = '';
    return;
  }

  const d = map[currentVendor];
  const names = Object.keys(map);
  const rangeText = hasRange ? `${dateFrom||'最早'} ～ ${dateTo||'最新'}` : '全部期間';

  // 置頂彙總卡片
  const unpaidVendorCount = names.filter(v => map[v].unpaid > 0).length;
  const unpaidOrderCount  = names.reduce((s,v) => s + map[v].orders.filter(o=>o.status==='pending').length, 0);
  const unpaidTotal       = names.reduce((s,v) => s + map[v].unpaid, 0);

  document.getElementById('vendor-summary-bar').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;box-shadow:var(--shadow);margin-bottom:1rem;">
      <div style="font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.75rem;">
        ${rangeText}　共 ${names.length} 家廠商
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div><div style="font-size:11px;color:var(--text3);margin-bottom:3px;">未付款筆數</div><div style="font-size:22px;font-weight:600;color:var(--amber);">${unpaidOrderCount} 筆</div></div>
        <div><div style="font-size:11px;color:var(--text3);margin-bottom:3px;">未付款廠商</div><div style="font-size:22px;font-weight:600;color:var(--amber);">${unpaidVendorCount} 家</div></div>
        <div><div style="font-size:11px;color:var(--text3);margin-bottom:3px;">未付款總額</div><div style="font-size:22px;font-weight:600;color:var(--amber);">$${unpaidTotal.toLocaleString()}</div></div>
      </div>
    </div>`;

  // 分拆未付款 / 已付款
  const unpaidOrders = d.orders.filter(o => o.status === 'pending').sort((a,b) => b.date.localeCompare(a.date));
  const paidOrders   = d.orders.filter(o => o.status === 'paid').sort((a,b) => b.date.localeCompare(a.date));

  function makeRows(list) {
    return list.map(o => `
      <tr class="order-row" onclick="showDetail('${o.id}')">
        <td>${o.date}</td>
        <td class="mono">${o.orderId||'—'}</td>
        <td style="color:var(--text2);font-size:12px;">${o.items.map(i => {
            const isNeg = Math.round(i.qty * i.price) < 0;
            return isNeg ? `<span style="color:#e53e3e;">↩${i.name}</span>` : i.name;
          }).join('、')}</td>
        <td style="font-weight:600;">$${o.total.toLocaleString()}</td>
        <td><span class="badge ${o.status==='paid'?'badge-paid':'badge-pending'}">${o.status==='paid'?'已付款':'未付款'}</span></td>
        <td style="font-size:12px;color:var(--text3);">${o.paidDate||'—'}</td>
      </tr>`).join('');
  }

  // 未付款卡片
  const unpaidCard = unpaidOrders.length > 0 ? `
    <div class="vendor-card" style="border-color:var(--amber);margin-bottom:1rem;">
      <div class="vendor-header" style="background:rgba(245,158,11,.06);">
        <div>
          <div class="vendor-name">${currentVendor}</div>
          <div class="vendor-meta" style="color:var(--amber);">未付款　${unpaidOrders.length} 筆</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--amber);margin-bottom:4px;">未付款總額</div>
          <div style="font-size:22px;font-weight:600;color:var(--amber);margin-bottom:8px;">$${d.unpaid.toLocaleString()}</div>
          <button class="btn btn-sm btn-success" onclick="batchMarkVendorPaid('${currentVendor.replace(/'/g,"\\'")}')">✓ 標記此廠商全部付清</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>訂單編號</th><th>商品</th><th>金額</th><th>狀態</th><th>付款日</th></tr></thead>
          <tbody>${makeRows(unpaidOrders)}</tbody>
        </table>
      </div>
    </div>` : `
    <div style="padding:.85rem 1.25rem;margin-bottom:1rem;background:rgba(34,197,94,.06);border:1px solid var(--green);border-radius:10px;font-size:13px;color:var(--green);font-weight:500;">
      ✓ ${currentVendor} 無未付款訂單
    </div>`;

  // 已付款卡片
  const paidCard = paidOrders.length > 0 ? `
    <div class="vendor-card" style="opacity:.85;">
      <div class="vendor-header">
        <div>
          <div class="vendor-name" style="color:var(--text2);">${currentVendor}</div>
          <div class="vendor-meta">已付款　${paidOrders.length} 筆</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">已付款總額</div>
          <div style="font-size:20px;font-weight:600;color:var(--green);">$${d.paid.toLocaleString()}</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>日期</th><th>訂單編號</th><th>商品</th><th>金額</th><th>狀態</th><th>付款日</th></tr></thead>
          <tbody>${makeRows(paidOrders)}</tbody>
        </table>
      </div>
    </div>` : '';

  document.getElementById('vendor-content').innerHTML = unpaidCard + paidCard;
}


// ── 歷史價格查詢 ──────────────────────────────────────
function initPriceSearch() {
  const vendors = [...new Set(orders.map(o=>o.vendor))].sort();
  const sel = document.getElementById('price-vendor');
  sel.innerHTML = '<option value="">所有廠商</option>' + vendors.map(v=>`<option value="${v}">${v}</option>`).join('');
  document.getElementById('price-search').value = '';
  document.getElementById('price-results').innerHTML = '<div style="color:var(--text3);font-size:13px;padding:1rem 0;">輸入商品名稱開始查詢，例如：北耆王、天麻、枸杞、特炊芎…</div>';
}

function renderPriceSearch() {
  const q = document.getElementById('price-search').value.toLowerCase().trim();
  const fv = document.getElementById('price-vendor').value;
  if (!q) { document.getElementById('price-results').innerHTML = '<div style="color:var(--text3);font-size:13px;padding:1rem 0;">輸入商品名稱開始查詢…</div>'; return; }
  
  const hits = [];
  orders.forEach(o => {
    if (fv && o.vendor !== fv) return;
    o.items.forEach(i => {
      if (i.name.toLowerCase().includes(q)) {
        hits.push({ date: o.date, vendor: o.vendor, name: i.name, qty: i.qty, price: i.price, orderId: o.orderId });
      }
    });
  });
  hits.sort((a, b) => b.date.localeCompare(a.date));
  
  if (!hits.length) { document.getElementById('price-results').innerHTML = '<div class="empty">找不到相符的商品記錄</div>'; return; }
  
  // 計算統計
  const prices = hits.map(h => h.price).filter(p => p > 0);
  const minP = Math.min(...prices), maxP = Math.max(...prices), avgP = prices.reduce((s,p)=>s+p,0)/prices.length;
  
  document.getElementById('price-results').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;">
      <div class="metric"><div class="metric-label">查詢筆數</div><div class="metric-value">${hits.length}</div></div>
      <div class="metric"><div class="metric-label">價格範圍</div><div class="metric-value" style="font-size:16px;">$${minP.toLocaleString()} ~ $${maxP.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">平均單價</div><div class="metric-value">$${Math.round(avgP).toLocaleString()}</div></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>日期</th><th>廠商</th><th>商品名稱</th><th>數量（斤）</th><th>單價</th><th>小計</th></tr></thead>
        <tbody>
          ${hits.map(h=>`<tr>
            <td>${h.date}</td>
            <td style="font-weight:500;">${h.vendor}</td>
            <td>${h.name}</td>
            <td style="color:var(--text2);">${h.qty}</td>
            <td style="font-weight:600;color:var(--blue);">$${h.price.toLocaleString()}</td>
            <td style="color:var(--text2);">$${Math.round(h.qty*h.price).toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── 匯出 & 備份 ───────────────────────────────────────
function exportCSV() {
  let csv = '\uFEFF日期,訂單編號,廠商,商品名,數量,單位,單價,小計,訂單總金額,狀態,付款日期,付款方式,付款備註,訂單備註\n';
  orders.sort((a,b)=>a.date.localeCompare(b.date)).forEach(o => {
    o.items.forEach((item,i) => {
      csv += [o.date, o.orderId, o.vendor, item.name, item.qty, item.unit||'斤', item.price,
        Math.round(item.qty*item.price), i===0?o.total:'',
        o.status==='paid'?'已付款':'未付款', o.paidDate||'',
        i===0?(o.payMethod||''):'' , i===0?(o.payNote||''):'',
        i===0?(o.note||''):''
      ].join(',') + '\n';
    });
  });
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}), '惟元進貨記錄_'+today()+'.csv');
  toast('✓ CSV 已匯出');
}

function backupData() {
  const blob = new Blob([JSON.stringify(orders,null,2)],{type:'application/json'});
  dl(blob, '惟元進貨備份_'+today()+'.json');
  toast('✓ 備份完成');
}

function dl(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

async function forceResync() {
  if (!supabaseReady) { toast('目前為離線模式，無法同步'); return; }
  setSyncStatus('syncing', '檢查資料完整性…');
  await importHistory();
  renderOrders();
  renderSummary();
  toast('✓ 同步完成');
}


// ── 批次標記付款 ──────────────────────────────────────

async function batchMarkPaid() {
  const ym = document.getElementById('monthly-month').value;
  if (!ym) { alert('請先選擇月份並查詢'); return; }
  if (!supabaseReady) { alert('目前為離線模式，無法批次更新'); return; }

  const unpaidList = orders.filter(o => o.date.startsWith(ym) && o.status === 'pending');
  if (!unpaidList.length) { toast('本月已無未付款訂單'); return; }

  const total = unpaidList.reduce((s, o) => s + o.total, 0);
  const confirmed = confirm(
    '【本月全數標記付款】\n\n' +
    '月份：' + ym + '\n' +
    '未付款筆數：' + unpaidList.length + ' 筆\n' +
    '未付款總額：$' + total.toLocaleString() + '\n\n' +
    '確定要標記為已付款嗎？'
  );
  if (!confirmed) return;

  const paidDate = prompt('請輸入付款日期：', today());
  if (!paidDate || !paidDate.trim()) return;

  const btn = document.querySelector('.btn-success.no-print');
  if (btn) { btn.disabled = true; btn.textContent = '處理中…'; }

  let done = 0, failed = 0;
  for (const o of unpaidList) {
    try {
      const res = await fetch(
        'https://lkryumerfbqfwfyxegve.supabase.co/rest/v1/orders?id=eq.' + o.id,
        {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ status: 'paid', paid_date: paidDate.trim() })
        }
      );
      if (res.ok) {
        o.status = 'paid';
        o.paidDate = paidDate.trim();
        done++;
      } else {
        const errText = await res.text();
        console.error('PATCH failed', o.id, res.status, errText);
        failed++;
      }
    } catch (e) {
      console.error('PATCH error', o.id, e);
      failed++;
    }
  }

  if (btn) { btn.disabled = false; btn.textContent = '✓ 本月全數標記付款'; }
  renderOrders();
  renderMonthly();
  if (failed > 0) {
    alert('完成：' + done + ' 筆成功，' + failed + ' 筆失敗，請查看 F12 Console 了解詳情');
  } else {
    toast('✓ 已標記 ' + done + ' 筆訂單為已付款');
  }
}

// ── 貨到付款查帳 ──────────────────────────────────────

function calcExpectedDate(sendDate) {
  const d = new Date(sendDate);
  d.setDate(d.getDate() + 1);
  const dow = d.getDay();
  let daysToNextTue = (2 - dow + 7) % 7;
  if (daysToNextTue === 0) daysToNextTue = 7;
  if (dow === 5 || dow === 6 || dow === 0) daysToNextTue += 7;
  d.setDate(d.getDate() + daysToNextTue);
  return d.toISOString().slice(0, 10);
}

async function _codFetch(path, options) {
  const base = 'https://lkryumerfbqfwfyxegve.supabase.co/rest/v1/';
  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json',
    'Prefer': (options && options.prefer) || 'return=minimal'
  };
  const res = await fetch(base + path, Object.assign({}, options, { headers }));
  if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function _mapCod(r) {
  return {
    id: r.id,
    sendDate: r.send_date,
    recipient: r.recipient,
    tracking: r.tracking,
    amount: Number(r.amount),
    note: r.note || '',
    expectedDate: r.expected_date || '',
    collected: !!r.collected,
    collectedDate: r.collected_date || '',
    actualAmount: r.actual_amount != null ? Number(r.actual_amount) : null
  };
}

function initCodDate() {
  const el = document.getElementById('cod-send-date');
  if (el && !el.value) el.value = today();
}

async function addCodRecord() {
  const sendDate  = document.getElementById('cod-send-date').value;
  const recipient = document.getElementById('cod-recipient').value.trim();
  const tracking  = document.getElementById('cod-tracking').value.trim();
  const amount    = parseFloat(document.getElementById('cod-amount').value) || 0;
  const note      = document.getElementById('cod-note').value.trim();

  if (!sendDate || !recipient || !tracking || !amount) {
    alert('請填寫寄件日期、收件人、物流編號與收款金額');
    return;
  }

  const expectedDate = calcExpectedDate(sendDate);
  const rec = {
    id: Date.now().toString(),
    send_date: sendDate,
    recipient,
    tracking,
    amount,
    note,
    expected_date: expectedDate,
    collected: false,
    collected_date: ''
  };

  const btn = document.querySelector('#sec-cod .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = '儲存中…'; }

  try {
    await _codFetch('cod_records', {
      method: 'POST',
      body: JSON.stringify(rec)
    });
    document.getElementById('cod-recipient').value = '';
    document.getElementById('cod-tracking').value = '';
    document.getElementById('cod-amount').value = '';
    document.getElementById('cod-note').value = '';
    document.getElementById('cod-send-date').value = today();
    await renderCodList();
    toast('✓ 代收款記錄已新增，預計入帳日：' + expectedDate);
  } catch (e) {
    alert('儲存失敗：' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '新增記錄'; }
  }
}

async function confirmCodCollected(id) {
  const date = prompt('請輸入入帳日期：', today());
  if (date === null) return;
  if (!date.trim()) { alert('請填寫入帳日期'); return; }

  const amtStr = prompt('請輸入實際到帳金額：', '');
  if (amtStr === null) return;

  const patch = { collected: true, collected_date: date.trim() };
  if (amtStr.trim()) patch.actual_amount = parseFloat(amtStr) || 0;

  try {
    await _codFetch('cod_records?id=eq.' + id, {
      method: 'PATCH',
      body: JSON.stringify(patch)
    });
    await renderCodList();
    toast('✓ 已確認到帳');
  } catch (e) {
    alert('更新失敗：' + e.message);
  }
}

async function deleteCodRecord(id) {
  if (!confirm('確定刪除這筆記錄？')) return;
  try {
    await _codFetch('cod_records?id=eq.' + id, { method: 'DELETE' });
    await renderCodList();
    toast('已刪除');
  } catch (e) {
    alert('刪除失敗：' + e.message);
  }
}

async function renderCodList() {
  const container = document.getElementById('cod-list');
  if (!container) return;
  container.innerHTML = '<div style="padding:1rem;color:var(--text3);font-size:13px;">載入中…</div>';

  try {
    const data = await _codFetch('cod_records?select=*&order=send_date.desc');
    const all = (data || []).map(_mapCod);

    if (all.length === 0) {
      container.innerHTML = '<div class="empty">尚無代收款記錄</div>';
      return;
    }

    const showUncollected = document.getElementById('cod-show-uncollected')?.checked;
    const records = showUncollected ? all.filter(r => !r.collected) : all;
    const todayStr = today();
    const overdue = all.filter(r => !r.collected && r.expectedDate && r.expectedDate <= todayStr);
    const totalUncollected = all.filter(r => !r.collected).reduce((s, r) => s + r.amount, 0);
    const uncollectedCount = all.filter(r => !r.collected).length;

    const overdueHTML = overdue.length > 0 ? `
      <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:.85rem 1rem;margin-bottom:1rem;font-size:13px;">
        <div style="font-weight:600;color:#856404;margin-bottom:.35rem;">⚠️ ${overdue.length} 筆款項已超過預計到帳日</div>
        ${overdue.map(r => `<div style="color:#856404;font-size:12px;margin-top:2px;">・${r.recipient}　$${r.amount.toLocaleString()}　預計 ${r.expectedDate}</div>`).join('')}
      </div>` : '';

    const statsHTML = `
      ${overdueHTML}
      <div style="display:flex;gap:1.5rem;padding:.75rem 1rem;background:var(--surface2);border-radius:8px;margin-bottom:1rem;font-size:13px;">
        <div><span style="color:var(--text3);">待到帳筆數　</span><span style="font-weight:600;color:var(--amber);">${uncollectedCount} 筆</span></div>
        <div><span style="color:var(--text3);">待到帳總額　</span><span style="font-weight:600;color:var(--amber);">$${totalUncollected.toLocaleString()}</span></div>
      </div>`;

    if (records.length === 0) {
      container.innerHTML = statsHTML + '<div class="empty">所有款項均已到帳 ✓</div>';
      return;
    }

    const rows = records.map(r => {
      const isOverdue = !r.collected && r.expectedDate && r.expectedDate <= todayStr;
      const actual = r.actualAmount != null ? r.actualAmount : null;
      const collectedLabel = r.collected
        ? (() => {
            const showAmt = actual != null ? actual : r.amount;
            const diff = actual != null ? actual - r.amount : 0;
            const diffStr = diff !== 0
              ? ` <span style="color:${diff<0?'#e53e3e':'var(--green)'};">(${diff>0?'+':''}$${diff.toLocaleString()})</span>`
              : '';
            return `<div style="font-size:11px;color:var(--green);margin-top:2px;">✓ 已到帳 $${showAmt.toLocaleString()}${diffStr}</div>
                    <div style="font-size:11px;color:var(--text3);">${r.collectedDate}</div>`;
          })()
        : `<div style="font-size:11px;color:${isOverdue?'#e53e3e':'var(--amber)'};margin-top:2px;">${isOverdue?'⚠️ 已逾期':'待到帳'}</div>`;

      return `
        <div style="display:grid;grid-template-columns:1fr 1fr 1.2fr 1fr auto;gap:10px;align-items:center;padding:.85rem 1rem;border-bottom:1px solid var(--border);${r.collected?'opacity:.5;':''}${isOverdue?'background:rgba(255,193,7,.06);':''}">
          <div>
            <div style="font-size:12px;color:var(--text3);">寄件日</div>
            <div style="font-size:13px;font-weight:500;">${r.sendDate}</div>
            ${r.expectedDate ? `<div style="font-size:11px;color:${isOverdue?'#e53e3e':'var(--text3)'};margin-top:2px;">預計入帳 ${r.expectedDate}</div>` : ''}
          </div>
          <div>
            <div style="font-size:12px;color:var(--text3);">收件人</div>
            <div style="font-size:13px;font-weight:500;">${r.recipient}</div>
            ${r.note ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;">${r.note}</div>` : ''}
          </div>
          <div>
            <div style="font-size:12px;color:var(--text3);">物流編號</div>
            <div style="font-size:13px;font-family:monospace;">${r.tracking}</div>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text3);">收款金額</div>
            <div style="font-size:15px;font-weight:600;">$${r.amount.toLocaleString()}</div>
            ${collectedLabel}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
            ${!r.collected ? `<button class="btn btn-sm btn-success" onclick="confirmCodCollected('${r.id}')">確認到帳</button>` : ''}
            <button class="btn btn-sm" style="font-size:11px;color:var(--text3);" onclick="deleteCodRecord('${r.id}')">刪除</button>
          </div>
        </div>`;
    }).join('');

    container.innerHTML = statsHTML + `
      <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">${rows}</div>`;

  } catch (e) {
    container.innerHTML = `<div style="padding:1rem;color:#e53e3e;font-size:13px;font-weight:500;">❌ 載入失敗：${e.message}</div>`;
  }
}

async function checkCodAlert() {
  try {
    const data = await _codFetch('cod_records?select=id,recipient,amount,expected_date,collected&order=send_date.desc');
    const all = (data || []).map(_mapCod);
    const todayStr = today();
    const overdue = all.filter(r => !r.collected && r.expectedDate && r.expectedDate <= todayStr);
    if (overdue.length === 0) return;

    const totalAmt = overdue.reduce((s, r) => s + r.amount, 0);
    const div = document.createElement('div');
    div.id = 'cod-alert-modal';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:8000;display:flex;align-items:center;justify-content:center;';
    div.innerHTML = `
      <div style="background:#fff;border-radius:14px;padding:2rem;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3);">
        <div style="font-size:18px;font-weight:700;margin-bottom:.5rem;">⚠️ 貨到付款到帳提醒</div>
        <div style="font-size:13px;color:#666;margin-bottom:1.25rem;">以下 ${overdue.length} 筆款項已超過預計入帳日，共 <strong>$${totalAmt.toLocaleString()}</strong></div>
        <div style="background:#fff8e1;border-radius:8px;padding:.85rem 1rem;margin-bottom:1.25rem;font-size:13px;line-height:2;">
          ${overdue.map(r => `<div>・<strong>${r.recipient}</strong>　$${r.amount.toLocaleString()}　<span style="color:#999;">預計 ${r.expectedDate}</span></div>`).join('')}
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button onclick="document.getElementById('cod-alert-modal').remove()" class="btn">稍後處理</button>
          <button onclick="document.getElementById('cod-alert-modal').remove();switchTab('cod')" class="btn btn-primary">前往查帳</button>
        </div>
      </div>`;
    document.body.appendChild(div);
  } catch (e) {
    // 靜默失敗
  }
}
